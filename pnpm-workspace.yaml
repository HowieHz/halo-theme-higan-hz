packages:
  - .
  - docs
trustPolicy: no-downgrade
trustPolicyExclude:
  - "semver@5.7.2"
  - "@halo-dev/api-client@2.25.1"
engineStrict: true # engines.node will be strictly enforced when installing dependencies
allowBuilds:
  esbuild: true
  unrs-resolver: true
shellEmulator: true
dedupePeers: true
