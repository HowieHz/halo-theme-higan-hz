name: Release Stable Theme

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: release-theme-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Stable Release Metadata
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    # This job updates release files and pushes the release commit back to the repository.
    permissions:
      contents: write
    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      previous_version: ${{ steps.meta.outputs.previous_version }}
      release_date: ${{ steps.meta.outputs.release_date }}
      release_commit_sha: ${{ steps.push.outputs.release_commit_sha }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}

      - name: Resolve Stable Release Metadata
        id: meta
        run: |
          RELEASE_VERSION=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if(!pkg.version){console.error('Missing version field in package.json'); process.exit(1);} process.stdout.write(String(pkg.version).trim());")

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version in package.json must be semantic version (x.y.z), got: $RELEASE_VERSION" >&2
            exit 1
          fi

          PREVIOUS_TAG=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No stable release tag found" >&2
            exit 1
          fi

          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Target release tag already exists: v$RELEASE_VERSION" >&2
            exit 1
          fi

          if [ "$(printf '%s\n%s\n' "${PREVIOUS_TAG#v}" "$RELEASE_VERSION" | sort -V | tail -n 1)" != "$RELEASE_VERSION" ] || [ "${PREVIOUS_TAG#v}" = "$RELEASE_VERSION" ]; then
            echo "Target release version must be greater than previous stable version ${PREVIOUS_TAG#v}" >&2
            exit 1
          fi

          RELEASE_DATE=$(TZ=Asia/Shanghai date +%F)
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=${PREVIOUS_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"

      - name: Update Theme Version Files
        run: node .github/scripts/update-theme-version.js "${{ steps.meta.outputs.release_version }}"

      - name: Promote Changelog Entry
        run: node .github/scripts/prepare-changelog-release.js "${{ steps.meta.outputs.release_version }}" "${{ steps.meta.outputs.previous_version }}" "${{ steps.meta.outputs.release_date }}"

      - name: Commit Release Metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json theme.yaml i18n-settings/theme.en.yaml docs/maintenance/changelog.md docs/en/maintenance/changelog.md
          git commit -m "chore(release): ${{ steps.meta.outputs.release_version }}"

      - name: Push Release Commit
        id: push
        run: |
          git push origin HEAD:main
          echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build Stable Release Assets
    needs: prepare
    # Build and attestation permissions stay with the reusable build workflow caller.
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/reusable-build-theme.yml
    with:
      theme_ref: ${{ needs.prepare.outputs.release_commit_sha }}
      artifact_name: release-theme-artifact

  verify-attestations:
    name: Verify Stable Release Attestations
    needs: [prepare, build]
    runs-on: ubuntu-latest
    # This release gate verifies that build artifacts were signed by the expected reusable workflow.
    permissions:
      contents: read
    steps:
      - name: Download Stable Release Assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: release-theme-artifact
          path: dist/theme-packages

      - name: Verify Reusable Workflow Attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/reusable-build-theme.yml
        run: |
          shopt -s nullglob
          artifacts=(dist/theme-packages/*.zip)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No stable release artifacts found for attestation verification." >&2
            exit 1
          fi

          pids=()
          for artifact in "${artifacts[@]}"; do
            (
              gh attestation verify "$artifact" \
                --repo "${GITHUB_REPOSITORY}" \
                --signer-workflow "${SIGNER_WORKFLOW}"
            ) &
            pids+=("$!")
          done

          for pid in "${pids[@]}"; do
            wait "$pid"
          done

  github-release:
    name: Publish Stable Release
    needs: [prepare, build, verify-attestations]
    runs-on: ubuntu-latest
    # Release publication needs repository write access, but no attestation privileges.
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.release_commit_sha }}

      - name: Download Stable Release Assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: release-theme-artifact
          path: dist/theme-packages

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_commit_sha }}
        run: |
          assets=()
          if [ -f dist/theme-packages/howiehz-higan-cn.zip ]; then
            assets+=(dist/theme-packages/howiehz-higan-cn.zip)
          fi
          while IFS= read -r asset; do
            if [ "$asset" != "dist/theme-packages/howiehz-higan-cn.zip" ]; then
              assets+=("$asset")
            fi
          done < <(find dist/theme-packages -maxdepth 1 -type f | sort)
          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --title "$RELEASE_VERSION" \
            --notes-file .github/templates/release-note-template.md \
            --target "$RELEASE_SHA"

  dispatch-follow-up:
    name: Dispatch Stable Release Follow-Up Events
    needs: [prepare, github-release, verify-attestations]
    runs-on: ubuntu-latest
    # Follow-up workflows run only after release publication and attestation verification succeed.
    permissions:
      contents: write
    steps:
      - name: Dispatch Stable Release Follow-Up Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_commit_sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type='stable_release_published' \
            -F client_payload[release_tag]="$RELEASE_TAG" \
            -F client_payload[release_version]="$RELEASE_VERSION" \
            -F client_payload[release_sha]="$RELEASE_SHA" \
            -F client_payload[target_branch]='main' \
            -F client_payload[deploy_docs]=true \
            -F client_payload[create_pr]=true

  app-store-release:
    name: Sync Stable Release to Halo App Store
    needs: [prepare, build, verify-attestations]
    runs-on: ubuntu-latest
    # App Store sync only downloads published assets and reads repository content.
    permissions:
      contents: read
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.release_commit_sha }}

      - name: Download Stable Release Assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: release-theme-artifact
          path: dist/theme-packages

      - name: Set Up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Release Utility Dependency
        run: pnpm add -w -D js-yaml

      - name: Run Halo App Store Sync
        env:
          ASSETS_DIR: dist/theme-packages
          GITHUB_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HALO_BACKEND_BASEURL: https://www.halo.run
          HALO_PAT: ${{ secrets.HALO_PAT }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_version }}
          RELEASE_NOTES_FILE: .github/templates/release-note-template.md
          RELEASE_PRERELEASE: "false"
        run: node .github/scripts/sync-release-to-app-store.js
