name: Generate Page Size Audit JSON

on:
  workflow_dispatch:
    inputs:
      start_version:
        description: "Starting version (1.45.0 / v1.45.0 / latest)"
        required: false
        default: "1.0.0"
      end_version:
        description: "Ending version (1.57.5 / v1.57.5 / latest)"
        required: false
        default: "latest"
      halo_version:
        description: "Halo version (2.23.1 / v2.23.1)"
        required: false
        default: "2.24.1"
      upload_lighthouse_artifact:
        description: "Upload raw Lighthouse .lighthouseci data for debugging?"
        required: true
        default: false
        type: boolean
      create_pr:
        description: "Create a PR to submit the data files?"
        required: true
        default: false
        type: boolean
  release:
    types: [published]
  repository_dispatch:
    types: [stable_release_published]

jobs:
  # Step 1: Get versions to test
  get-versions:
    name: Get Version List
    runs-on: ubuntu-latest
    # Skip if triggered by a prerelease
    if: github.event_name != 'release' || github.event.release.prerelease != true
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
      summary_start_version: ${{ steps.get-versions.outputs.summary_start_version }}
      summary_end_version: ${{ steps.get-versions.outputs.summary_end_version }}
      halo_version: ${{ steps.get-versions.outputs.halo_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Get version list
        id: get-versions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # https://github.com/actions/github-script/releases/tag/v9.0.0
        with:
          script: |
            let startVersion, endVersion;
            const normalizeVersion = (value, allowLatest = false) => {
              const raw = String(value ?? '').trim();
              if (raw === '') return '';
              if (allowLatest && raw.toLowerCase() === 'latest') return 'latest';
              return `v${raw.replace(/^v/, '')}`;
            };
            const normalizeHaloVersion = (value) => String(value ?? '').trim().replace(/^v/, '') || '2.24.1';
            const formatVersion = (value) => String(value ?? '').replace(/^v/, '');

            if ('${{ github.event_name }}' === 'release') {
              const releaseVersion = '${{ github.event.release.tag_name }}';
              startVersion = releaseVersion;
              endVersion = releaseVersion;
              console.log(`Release triggered: testing version ${releaseVersion}`);
            } else if ('${{ github.event_name }}' === 'repository_dispatch') {
              const releaseVersion = '${{ github.event.client_payload.release_tag }}';
              startVersion = releaseVersion;
              endVersion = releaseVersion;
              console.log(`Repository dispatch triggered: testing version ${releaseVersion}`);
            } else {
              startVersion = normalizeVersion('${{ github.event.inputs.start_version }}', true);
              endVersion = normalizeVersion('${{ github.event.inputs.end_version }}', true);
            }
            core.setOutput('halo_version', normalizeHaloVersion('${{ github.event.inputs.halo_version }}'));

            if (startVersion === '' || endVersion === '') {
              core.setFailed('start_version and end_version cannot be empty.');
              return;
            }

            // Fetch all releases (with pagination)
            console.log('Fetching all releases...');
            const releases = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const { data } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page: page
              });
              
              releases.push(...data);
              console.log(`Fetched page ${page}, ${data.length} releases`);
              
              if (data.length < 100) {
                hasMore = false;
              } else {
                page++;
              }
            }

            console.log(`Total fetched ${releases.length} releases`);

            // Filter out prereleases (using GitHub API 'prerelease' field)
            const stableReleases = releases.filter(r => {
              if (r.prerelease) {
                console.log(`⊘ Skipping prerelease: ${r.tag_name}`);
                return false;
              }
              return true;
            });

            console.log(`Filtered to ${stableReleases.length} stable releases`);

            // Sort by semantic versioning (oldest to newest)
            const parseVersion = (version) => {
              const match = version.match(/^v?(\d+)\.(\d+)\.(\d+)(?:-(.+))?$/);
              if (!match) return null;
              const [, major, minor, patch] = match;
              return {
                major: parseInt(major, 10),
                minor: parseInt(minor, 10),
                patch: parseInt(patch, 10)
              };
            };

            stableReleases.sort((a, b) => {
              const versionA = parseVersion(a.tag_name);
              const versionB = parseVersion(b.tag_name);
              
              if (!versionA || !versionB) {
                console.warn(`⚠️  Unable to parse version: ${a.tag_name} or ${b.tag_name}`);
                return 0;
              }
              
              if (versionA.major !== versionB.major) return versionA.major - versionB.major;
              if (versionA.minor !== versionB.minor) return versionA.minor - versionB.minor;
              return versionA.patch - versionB.patch;
            });

            // Find the version range
            const resolvedStartVersion = startVersion === 'latest' ? stableReleases.at(-1)?.tag_name ?? '' : startVersion;
            const resolvedEndVersion = endVersion === 'latest' || endVersion === '' ? stableReleases.at(-1)?.tag_name ?? '' : endVersion;
            const startIndex = stableReleases.findIndex(r => r.tag_name === resolvedStartVersion);
            const endIndex = stableReleases.findIndex(r => r.tag_name === resolvedEndVersion);

            if (startIndex === -1) {
              core.setFailed(`Cannot find start version: ${resolvedStartVersion || startVersion}. Available stable versions: ${stableReleases.slice(0, 10).map(r => r.tag_name).join(', ')}...`);
              return;
            }
            if (endIndex === -1) {
              core.setFailed(`Cannot find end version: ${resolvedEndVersion || endVersion}`);
              return;
            }

            // Extract version list (from start to end)
            const versionList = stableReleases
              .slice(startIndex, endIndex + 1)
              .map(r => r.tag_name);

            console.log(`Found ${versionList.length} versions:`, versionList);
            core.setOutput('versions', JSON.stringify(versionList));
            core.setOutput('summary_start_version', formatVersion(versionList[0] || ''));
            core.setOutput('summary_end_version', formatVersion(versionList[versionList.length - 1] || ''));

      - name: Write versions summary
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # https://github.com/actions/github-script/releases/tag/v9.0.0
        with:
          script: |
            const fs = require('fs');
            const versions = JSON.parse('${{ steps.get-versions.outputs.versions }}' || '[]');
            const count = Array.isArray(versions) ? versions.length : 0;
            const first = '${{ steps.get-versions.outputs.summary_start_version }}';
            const last = '${{ steps.get-versions.outputs.summary_end_version }}';
            const out = `## Page Resource Size Diff Versions\n\n- Versions found: ${count}\n- Range: ${first} → ${last}\n`;
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out);

  # Step 2: Run tests for each version in parallel
  test-versions:
    name: Test ${{ matrix.version }}
    needs: get-versions
    strategy:
      matrix:
        version: ${{ fromJson(needs.get-versions.outputs.versions) }}
      fail-fast: false # Even if a version fails, continue testing other versions

    # Call the reusable workflow at the job level (not as a step).
    uses: ./.github/workflows/reusable-site-checks.yml
    with:
      theme_ref: ${{ matrix.version }}
      ref_name: ${{ matrix.version }}
      halo_version: ${{ needs.get-versions.outputs.halo_version }}
      output_dir: ".github/page_size_audit_results"
      output_filename: ${{ matrix.version }}
      json_only: true
      run_lighthouse_ci: true
      upload_lighthouse_artifact: ${{ github.event.inputs.upload_lighthouse_artifact == 'true' }}

  # Step 3: Collect all reports and create a PR
  collect-and-pr:
    name: Collect Reports and Create PR
    needs: test-versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download all reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          # reusable-audit uploads artifacts named `page-size-reports-${{ ref_name }}`
          pattern: page-size-reports-*
          path: ./all-reports
          # Merge matching artifacts into one directory so downstream steps can consume them directly.
          merge-multiple: true

      - name: Copy reports to page_size_audit_results
        if: github.event_name == 'release' || (github.event_name == 'repository_dispatch' && github.event.action == 'stable_release_published' && github.event.client_payload.create_pr == true) || github.event.inputs.create_pr == 'true'
        run: |
          mkdir -p .github/page_size_audit_results
          # Recurse defensively in case artifact layout changes and JSON files land in nested directories.
          find ./all-reports -type f -name '*.json' | while read -r file; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              if echo "$filename" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+\.json$'; then
                cp "$file" ".github/page_size_audit_results/${filename}"
                echo "✓ Copied ${filename} -> .github/page_size_audit_results/${filename}"
              else
                echo "⚠️ Skipping non-version artifact file: $filename"
              fi
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm fmt

      - name: Create PR with data files
        if: github.event_name == 'release' || (github.event_name == 'repository_dispatch' && github.event.action == 'stable_release_published' && github.event.client_payload.create_pr == true) || github.event.inputs.create_pr == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.1
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          base: main # Use 'main' as the base branch; that's sufficient for the current update flow
          # Use a PAT instead of GITHUB_TOKEN so the created PR can trigger other workflows
          # Required permissions (fine-grained PAT):
          # - Contents: Read and Write (create branches and commits)
          # - Pull requests: Read and Write (create PRs)
          # - Workflows: Read and Write (allow PRs to trigger workflows)
          commit-message: "docs: update page resource size diff results for ${{ needs.get-versions.outputs.summary_start_version }} to ${{ needs.get-versions.outputs.summary_end_version }}"
          title: "docs: Update Page Resource Size Diff Results"
          body: |
            ## Page Resource Size Diff Results Update

            This PR adds or updates page resource size diff results for versions:
            - **Start Version:** ${{ needs.get-versions.outputs.summary_start_version }}
            - **End Version:** ${{ needs.get-versions.outputs.summary_end_version }}

            The following JSON data files have been updated in `.github/page_size_audit_results/`:
            - Multiple version result files

            These files will be used to generate page resource size trend charts.

            ---
            *Auto-generated by the Generate Page Size Audit JSON workflow*
          branch: docs/page-size-audit-${{ github.run_number }}
          delete-branch: true
          labels: |
            deploy-docs
          add-paths: .github/page_size_audit_results/*.json
