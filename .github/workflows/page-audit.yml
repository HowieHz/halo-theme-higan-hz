name: Page Resource Size Diff Check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  audit-current:
    name: Check Current Version
    uses: ./.github/workflows/reusable-site-audit.yml
    with:
      theme_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      ref_name: current
      run_lighthouse_ci: true
      upload_lighthouse_artifact: true

  audit-base:
    name: Check Base Version
    # Run when the workflow is triggered by a pull request event.
    # Use presence of `github.event.pull_request` so this works for both
    # `pull_request` and `pull_request_target` triggers.
    if: github.event.pull_request != null
    uses: ./.github/workflows/reusable-site-audit.yml
    with:
      theme_ref: ${{ github.event.pull_request.base.sha }}
      ref_name: base
      run_lighthouse_ci: true

  lighthouse-gate:
    name: Lighthouse Quality Gate
    needs: [audit-current]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download Lighthouse Raw Data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: lighthouse-raw-data-current
          path: ./lighthouse-reports-current

      - name: Check Lighthouse Scores
        run: node .github/scripts/check-lighthouse-scores.js
        env:
          MANIFEST: ./lighthouse-reports-current/manifest.json

  compare-and-comment:
    name: Compare Page Resource Sizes and Comment Report
    needs: [audit-current, audit-base]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions: # use permissions because use of pr-comments
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download current reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: page-size-reports-current
          path: ./reports-current

      - name: Download Lighthouse raw data (current)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: lighthouse-raw-data-current
          path: ./lighthouse-reports-current

      - name: Download base reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: page-size-reports-base
          path: ./reports-base

      - name: Generate comparison report
        run: |
          node .github/scripts/compare-page-size-reports.js
        env:
          CURRENT_REPORT: ./reports-current/page-size-report.json
          BASE_REPORT: ./reports-base/page-size-report.json
          OUTPUT_FILE: ./comparison-report.md

      - name: Generate Lighthouse scores report
        run: |
          node .github/scripts/generate-lighthouse-scores.js
        env:
          MANIFEST: ./lighthouse-reports-current/manifest.json
          OUTPUT_FILE: ./lighthouse-scores.md

      - name: Comment comparison and Lighthouse scores on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const runId = context.runId || process.env.GITHUB_RUN_ID;

            let comparison = '';
            try {
              comparison = fs.readFileSync('./comparison-report.md', 'utf8').trim();
            } catch (e) {
              console.log('⚠️ comparison report not found:', e.message || e);
            }

            let scores = '';
            try {
              scores = fs.readFileSync('./lighthouse-scores.md', 'utf8').trim();
            } catch (e) {
              console.log('⚠️ lighthouse scores not found:', e.message || e);
            }

            let body = '';
            if (comparison) body += comparison + '\n\n';
            if (scores) body += scores + '\n\n';

            // Try to find the artifact for lighthouse raw data in this run
            const artifactName = 'lighthouse-raw-data-current';
            let artifactUrl = '';
            if (runId) {
              try {
                const res = await github.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id: Number(runId) });
                const found = (res.data.artifacts || []).find(a => a.name === artifactName);
                if (found) {
                  artifactUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${found.id}`;
                }
              } catch (err) {
                console.log('⚠️ Could not list artifacts:', err.message || err);
              }
            } else {
              console.log('⚠️ GITHUB run id not available');
            }

            // Footer per request: include run link when available
            if (runId) {
              const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
              body += '\n\n---\n\n*This comparison report is automatically generated by [CI](' + runUrl + ')*\n\n';
            } else {
              console.log('⚠️ GITHUB run id not available');
              body += '\n\n---\n\nThis comparison report is automatically generated by CI\n\n';
            }

            if (artifactUrl) {
              body += 'To help reproduce and troubleshoot issues, the raw Lighthouse results have been uploaded as an artifact for this Actions run. [Download the raw results here](' + artifactUrl + ')\n';
            } else {
              body += 'To help reproduce and troubleshoot issues, the raw Lighthouse results have been uploaded as an artifact for this Actions run. (artifact not available)\n';
            }

            // Write the same report to the Actions job summary
            try {
              const fs = require('fs');
              const summaryPath = process.env.GITHUB_STEP_SUMMARY;
              if (summaryPath) {
                // Append body to job summary so it appears in the Actions UI
                fs.appendFileSync(summaryPath, body + '\n');
                console.log('✓ Written combined report to job summary');
              } else {
                console.log('⚠️ GITHUB_STEP_SUMMARY not available in this runner');
              }
            } catch (e) {
              console.log('⚠️ Could not write to job summary:', e.message || e);
            } 

            try {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: context.issue.number,
                body: body
              });
              console.log('✓ Combined report posted successfully');
            } catch (error) {
              if (error && error.status === 403) {
                console.log('⚠️ Cannot post combined report (insufficient permissions).');
                console.log('📊 Reports generated and uploaded as artifacts; view manually if needed.');
              } else {
                throw error;
              }
            }
