name: Nightly Theme Prerelease

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force create a nightly prerelease even if main had no commits yesterday
        required: true
        type: boolean
        default: false

concurrency:
  group: nightly-theme-prerelease
  cancel-in-progress: false

jobs:
  prerelease:
    name: Build and Publish Nightly Prerelease
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Check main branch changes since yesterday
        id: changes
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          WINDOW_START=$(TZ=Asia/Shanghai date -d 'yesterday 00:00:00' '+%Y-%m-%d %H:%M:%S %z')
          WINDOW_END=$(TZ=Asia/Shanghai date -d 'today 00:00:00' '+%Y-%m-%d %H:%M:%S %z')
          LAST_STABLE_TAG=$(git tag --merged HEAD --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [ -n "$LAST_STABLE_TAG" ]; then
            COMMIT_RANGE="$LAST_STABLE_TAG..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi
          EXCLUDED_SUBJECT_PREFIX='chore: Update Page Size Audit Results'
          COMMIT_COUNT=$(git log "$COMMIT_RANGE" --since="$WINDOW_START" --until="$WINDOW_END" --format='%s' \
            | awk -v prefix="$EXCLUDED_SUBJECT_PREFIX" 'index($0, prefix) != 1' \
            | grep -c . || true)
          echo "last_stable_tag=${LAST_STABLE_TAG:-none}" >> "$GITHUB_OUTPUT"
          echo "commit_range=$COMMIT_RANGE" >> "$GITHUB_OUTPUT"
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$FORCE" = "true" ] || [ "$COMMIT_COUNT" -gt 0 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when no nightly release is needed
        if: steps.changes.outputs.should_release != 'true'
        run: |
          echo "No commits on main during the previous Asia/Shanghai day window; skipping nightly prerelease."
          exit 0

      - name: Setup Node.js and pnpm
        if: steps.changes.outputs.should_release == 'true'
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install js-yaml
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm add -w -D js-yaml

      - name: Prepare prerelease version
        if: steps.changes.outputs.should_release == 'true'
        id: version
        run: |
          CURRENT_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          BASE_VERSION=${CURRENT_VERSION%%-*}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          TIMESTAMP=$(TZ=Asia/Shanghai date +%Y%m%d%H%M%S%3N)
          PRERELEASE_VERSION="$MAJOR.$MINOR.$NEXT_PATCH-alpha.$TIMESTAMP"
          PRERELEASE_TAG="v$PRERELEASE_VERSION"
          if git rev-parse "$PRERELEASE_TAG" >/dev/null 2>&1; then
            echo "Prerelease tag already exists: $PRERELEASE_TAG" >&2
            exit 1
          fi
          echo "prerelease_version=$PRERELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease_tag=$PRERELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create local release branch
        if: steps.changes.outputs.should_release == 'true'
        run: git switch -c "nightly-release-${{ steps.version.outputs.prerelease_version }}"

      - name: Update prerelease version fields
        if: steps.changes.outputs.should_release == 'true'
        run: node .github/scripts/update-theme-version.js "${{ steps.version.outputs.prerelease_version }}"

      - name: Build project
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm build

      - name: Package theme assets
        if: steps.changes.outputs.should_release == 'true'
        run: bash .github/scripts/build-theme-packages.sh .github/include-list.txt dist/theme-packages
      - name: Attest build provenance
        if: steps.changes.outputs.should_release == 'true'
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: dist/theme-packages/*.zip

      - name: Create prerelease
        if: steps.changes.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE_TAG: ${{ steps.version.outputs.prerelease_tag }}
          PRERELEASE_VERSION: ${{ steps.version.outputs.prerelease_version }}
        run: |
          assets=()
          if [ -f dist/theme-packages/howiehz-higan-cn.zip ]; then
            assets+=(dist/theme-packages/howiehz-higan-cn.zip)
          fi
          while IFS= read -r asset; do
            if [ "$asset" != "dist/theme-packages/howiehz-higan-cn.zip" ]; then
              assets+=("$asset")
            fi
          done < <(find dist/theme-packages -maxdepth 1 -type f | sort)
          gh release create "$PRERELEASE_TAG" "${assets[@]}" \
            --title "$PRERELEASE_VERSION" \
            --notes-file .github/templates/release-note-template.md \
            --prerelease \
            --target "$GITHUB_SHA"

      - name: Sync prerelease to Halo App Store
        if: steps.changes.outputs.should_release == 'true'
        env:
          ASSETS_DIR: dist/theme-packages
          GITHUB_RELEASE_TAG: ${{ steps.version.outputs.prerelease_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HALO_BACKEND_BASEURL: https://www.halo.run
          HALO_PAT: ${{ secrets.HALO_PAT }}
        run: node .github/scripts/sync-release-to-app-store.js
