name: Maintain Code

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# 并发控制：
# - push 到 main 分支：所有推送归入同一组 'maintain-code-main'，新推送取消正在进行的旧运行，
#   确保 main 分支的自动格式化和检查始终基于最新代码，避免多个并发运行相互干扰。
# - pull_request：每个 PR 独立成组（组名包含 PR 编号），同一 PR 内新提交时取消旧运行，
#   保证每个 PR 只保留最新的检查结果，节省资源。
concurrency:
  group: |
    ${{
      (github.event_name == 'push') && 'maintain-code-main' ||
      (github.event_name == 'pull_request') && format('maintain-code-pr-{0}', github.event.pull_request.number) ||
      'maintain-code-other'
    }}
  cancel-in-progress: true

jobs:
  check:
    name: Maintain Code
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
          # Release version inference walks from the latest stable tag to the PR head.
          # Keep full history here so the autofix sees semantic commits that are already on the PR base.
          fetch-depth: 0
          # why token is required
          # ref: https://github.com/stefanzweifel/git-auto-commit-action/tree/v7/?tab=readme-ov-file#commits-made-by-this-action-do-not-trigger-new-workflow-runs
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        id: format
        run: pnpm fmt

      - name: Lint
        id: lint
        run: pnpm lint

      - name: Fix release PR package version
        id: release-version
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'release')
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_REPOSITORY: ${{ github.repository }}
        run: |
          git fetch "https://github.com/$BASE_REPOSITORY.git" "$BASE_REF:refs/remotes/base/$BASE_REF" --tags
          LATEST_BASE_SHA=$(git rev-parse "refs/remotes/base/$BASE_REF")
          if [ "$BASE_SHA" != "$LATEST_BASE_SHA" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=release PR base is not the latest $BASE_REF commit" >> "$GITHUB_OUTPUT"
            echo "Release PR base is $BASE_SHA, but origin/$BASE_REF is $LATEST_BASE_SHA; skipping package.json version autofix."
            exit 0
          fi

          PREVIOUS_TAG=$(node .github/scripts/release-version-policy.js latest-stable-tag)
          EXPECTED_VERSION=$(node .github/scripts/release-version-policy.js next "${PREVIOUS_TAG#v}" "${PREVIOUS_TAG}..${HEAD_SHA}")
          CURRENT_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          echo "expected_version=$EXPECTED_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node -e "const fs=require('node:fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');" "$EXPECTED_VERSION"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Write Format and Lint Summary
        if: always()
        run: |
          echo "## Format and Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Format: ${{ steps.format.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ steps.lint.outcome }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ contains(github.event.pull_request.labels.*.name, 'release') }}" = "true" ]; then
            echo "- Release version autofix: ${{ steps.release-version.outcome }}" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.release-version.outputs.skipped }}" = "true" ]; then
              echo "- Release version autofix skipped: ${{ steps.release-version.outputs.skip_reason }}" >> $GITHUB_STEP_SUMMARY
            elif [ -n "${{ steps.release-version.outputs.expected_version }}" ]; then
              echo "- Expected release version: ${{ steps.release-version.outputs.expected_version }}" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Commit changes
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # https://github.com/stefanzweifel/git-auto-commit-action/releases/tag/v7.1.0
        id: auto-commit-action
        with:
          commit_message: |
            style: auto-format and lint fixes

      - name: Create fork PR autofix patch
        id: fork-autofix-patch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          patch_path="$RUNNER_TEMP/ci-autofix.patch"
          git add --intent-to-add -- .
          if git diff --exit-code --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --binary > "$patch_path"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "patch_path=$patch_path" >> "$GITHUB_OUTPUT"
          git status --short

      - name: Upload fork PR autofix patch
        id: upload-fork-autofix-patch
        if: steps.fork-autofix-patch.outputs.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: ci-autofix.patch
          path: ${{ steps.fork-autofix-patch.outputs.patch_path }}
          archive: false
          if-no-files-found: error

      - name: "Run if changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: echo "Changes!"

      - name: "Run if no changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'false'
        run: echo "No Changes!"

      - name: Write auto-commit summary
        run: |
          echo "## Auto-commit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "- Skipped because this PR comes from a fork" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.fork-autofix-patch.outputs.has_changes }}" = "true" ]; then
              echo "- Formatting or lint fixes changed files; download the patch and apply it locally." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| System | Commands |" >> $GITHUB_STEP_SUMMARY
              echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
              echo "| Linux/macOS | \`curl -L -o ci-autofix.patch '${{ steps.upload-fork-autofix-patch.outputs.artifact-url }}' && git apply ci-autofix.patch\` |" >> $GITHUB_STEP_SUMMARY
              echo "| Windows PowerShell | \`Invoke-WebRequest -Uri '${{ steps.upload-fork-autofix-patch.outputs.artifact-url }}' -OutFile ci-autofix.patch; git apply ci-autofix.patch\` |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```text' >> $GITHUB_STEP_SUMMARY
              echo "${{ steps.upload-fork-autofix-patch.outputs.artifact-url }}" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "- No changes detected" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "${{ steps.auto-commit-action.outputs.changes_detected }}" = "true" ]; then
            echo "- Changes detected and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- No changes detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail fork PR with autofix patch
        if: steps.fork-autofix-patch.outputs.has_changes == 'true'
        run: |
          echo "Formatting or lint fixes changed files, but this PR comes from a fork and CI cannot push fixes back automatically." >&2
          echo "Download the ci-autofix.patch artifact from the job summary and apply it locally." >&2
          exit 1
