name: Release Guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

jobs:
  guard:
    name: Check Release Constraints
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install js-yaml
        run: pnpm add -w -D js-yaml

      - name: Check changelog and version constraints
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          IS_RELEASE_PR: ${{ contains(github.event.pull_request.labels.*.name, 'release') }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const { execFileSync } = require('node:child_process');
          const yaml = require('js-yaml');

          const baseSha = process.env.BASE_SHA;
          const isReleasePr = process.env.IS_RELEASE_PR === 'true';
          const localizedThemeFiles = fs
            .readdirSync(path.join(process.cwd(), 'i18n-settings'))
            .filter((fileName) => /^theme\..+\.ya?ml$/u.test(fileName))
            .map((fileName) => path.posix.join('i18n-settings', fileName));

          const readFromGit = (ref, filePath) => execFileSync('git', ['show', `${ref}:${filePath}`], { encoding: 'utf8' });
          const readVersionFromPackageJson = (content) => JSON.parse(content).version;
          const readSpecVersionFromThemeYaml = (content, filePath) => {
            const doc = yaml.load(content);
            const value = doc?.spec?.version;
            if (value === undefined || value === null || String(value).trim() === '') {
              throw new Error(`Missing spec.version field in ${filePath}`);
            }
            return String(value).trim();
          };

          const parseVersion = (v) => v.split('.').map(Number);
          const isGreaterThan = (a, b) => {
            const [aMajor, aMinor, aPatch] = parseVersion(a);
            const [bMajor, bMinor, bPatch] = parseVersion(b);
            if (aMajor !== bMajor) return aMajor > bMajor;
            if (aMinor !== bMinor) return aMinor > bMinor;
            return aPatch > bPatch;
          };

          const changelogVersionHeadingRegex = /^## \[(\d+\.\d+\.\d+)\]\s*-\s*/gmu;
          const changelogLinkDefRegex = /^\[(Unreleased|unreleased|\d+\.\d+\.\d+)\]:\s*(https:\/\/github\.com\/HowieHz\/halo-theme-higan-hz\/(?:compare\/\S+|releases\/tag\/\S+))\s*$/gmu;
          const requiredRepoBase = 'https://github.com/HowieHz/halo-theme-higan-hz';

          const validateChangelogLinkDefinitions = (changelog, changelogPath) => {
            const versions = [...changelog.matchAll(changelogVersionHeadingRegex)].map((match) => match[1]);
            if (versions.length === 0) {
              throw new Error(`${changelogPath} must contain at least one release heading like ## [x.y.z] - yyyy-mm-dd`);
            }

            const links = new Map();
            for (const match of changelog.matchAll(changelogLinkDefRegex)) {
              const rawKey = match[1];
              const key = rawKey.toLowerCase() === 'unreleased' ? 'Unreleased' : rawKey;
              links.set(key, match[2]);
            }

            const expectedUnreleasedLink = `${requiredRepoBase}/compare/v${versions[0]}...HEAD`;
            if (links.get('Unreleased') !== expectedUnreleasedLink) {
              throw new Error(`${changelogPath} must contain [Unreleased]: ${expectedUnreleasedLink}`);
            }

            for (let index = 0; index < versions.length - 1; index += 1) {
              const current = versions[index];
              const previous = versions[index + 1];
              const expectedLink = `${requiredRepoBase}/compare/v${previous}...v${current}`;
              if (links.get(current) !== expectedLink) {
                throw new Error(`${changelogPath} must contain [${current}]: ${expectedLink}`);
              }
            }

            const oldest = versions[versions.length - 1];
            const expectedOldestLink = `${requiredRepoBase}/releases/tag/v${oldest}`;
            if (links.get(oldest) !== expectedOldestLink) {
              throw new Error(`${changelogPath} must contain [${oldest}]: ${expectedOldestLink}`);
            }
          };

          const currentPackageVersion = readVersionFromPackageJson(fs.readFileSync('package.json', 'utf8'));
          const basePackageVersion = readVersionFromPackageJson(readFromGit(baseSha, 'package.json'));
          if (isReleasePr) {
            if (currentPackageVersion === basePackageVersion) {
              throw new Error(`release PR must change package.json version: ${basePackageVersion}`);
            }
            if (!/^\d+\.\d+\.\d+$/u.test(currentPackageVersion)) {
              throw new Error(`package.json version in release PR must be semantic version (x.y.z), got: ${currentPackageVersion}`);
            }
            if (!isGreaterThan(currentPackageVersion, basePackageVersion)) {
              throw new Error(`release PR version must be greater than base version: ${basePackageVersion} -> ${currentPackageVersion}`);
            }
          } else if (currentPackageVersion !== basePackageVersion) {
            throw new Error(`package.json version must not be changed in non-release PRs: ${basePackageVersion} -> ${currentPackageVersion}`);
          }

          const currentThemeVersion = readSpecVersionFromThemeYaml(fs.readFileSync('theme.yaml', 'utf8'), 'theme.yaml');
          const baseThemeVersion = readSpecVersionFromThemeYaml(readFromGit(baseSha, 'theme.yaml'), 'theme.yaml');

          if (currentThemeVersion !== baseThemeVersion) {
            throw new Error(`theme.yaml spec.version must not be changed in PRs: ${baseThemeVersion} -> ${currentThemeVersion}`);
          }

          for (const filePath of localizedThemeFiles) {
            const currentVersion = readSpecVersionFromThemeYaml(fs.readFileSync(filePath, 'utf8'), filePath);
            const baseVersion = readSpecVersionFromThemeYaml(readFromGit(baseSha, filePath), filePath);
            if (currentVersion !== baseVersion) {
              throw new Error(`${filePath} spec.version must not be changed in PRs: ${baseVersion} -> ${currentVersion}`);
            }
          }

          for (const changelogPath of ['docs/maintenance/changelog.md', 'docs/en/maintenance/changelog.md']) {
            const changelog = fs.readFileSync(changelogPath, 'utf8');
            if (!changelog.includes('## [Unreleased]')) {
              throw new Error(`${changelogPath} must keep the ## [Unreleased] section`);
            }
            validateChangelogLinkDefinitions(changelog, changelogPath);
          }
          NODE

      - name: Write summary and comment on PR
        if: contains(github.event.pull_request.labels.*.name, 'release')
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const releaseVersion = pkg?.version || 'unknown';

            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const latestStable = releases.find((release) => !release.prerelease);
            const summary = [
              '## Release PR',
              '',
              `- Previous stable release: ${latestStable?.tag_name || 'none'}`,
              `- Requested release version (from package.json): ${releaseVersion}`,
            ].join('\n');

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`);

            const marker = '<!-- release-guard-comment -->';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## Release Guard',
              '',
              `- Previous stable release: ${latestStable?.tag_name || 'none'}`,
              `- Requested release version (from package.json): ${releaseVersion}`,
              '',
              `Generated by [workflow run](${runUrl}).`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existing = comments
                .filter((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker))
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                console.log(`Updated existing release-guard comment: ${existing.id}`);
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
                console.log('Created release-guard comment');
              }
            } catch (error) {
              if (error?.status === 403) {
                console.log('Insufficient permission to comment on PR, summary has been written.');
              } else {
                throw error;
              }
            }
