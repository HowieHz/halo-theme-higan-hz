name: Upload Theme Screenshots to Argos

on:
  workflow_run:
    workflows: ["Generate Theme Screenshots"]
    types: [completed]

jobs:
  upload:
    name: Download screenshots and upload to Argos
    # Only run when the generator workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Detect package manager in package.json
        id: detect-pm
        run: |
          pm=""
          if [ -f package.json ]; then
            # If packageManager value starts with pnpm@, extract the full pnpm@... token
            if grep -Eq '"packageManager"[[:space:]]*:[[:space:]]*"[[:space:]]*pnpm@' package.json; then
              pm=$(sed -n 's/.*"packageManager"[[:space:]]*:[[:space:]]*"[[:space:]]*\(pnpm@[^"]*\)".*/\1/p' package.json || true)
            fi
          fi
          echo "pm=${pm}" >> $GITHUB_OUTPUT

      - name: Setup pnpm (normal, when packageManager declares pnpm)
        if: ${{ steps.detect-pm.outputs.pm != '' && contains(steps.detect-pm.outputs.pm, 'pnpm') }}
        uses: pnpm/action-setup@v4

      - name: Setup pnpm (fallback when packageManager missing)
        if: ${{ steps.detect-pm.outputs.pm == '' }}
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Download screenshots
        id: dl-screenshots
        uses: actions/download-artifact@v8
        with:
          pattern: screenshots-*
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./screenshots

      - name: Ensure screenshots present
        run: |
          if [ ! -d screenshots ] || [ -z "$(ls -A screenshots 2>/dev/null)" ]; then
            echo "No screenshots downloaded from run ${{ github.event.workflow_run.id }}."
            exit 1
          fi

      - name: Upload to Argos
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          if [ -z "$ARGOS_TOKEN" ]; then
            echo "ARGOS_TOKEN not set; skipping upload to Argos"
            echo "### Argos upload skipped: ARGOS_TOKEN not set" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "Uploading screenshots to Argos (artifact: $ARTIFACT_NAME)"
          # Ensure we capture the exit status of the upload pipeline instead of exiting
          # immediately due to the runner's default `set -e` behavior.
          set -o pipefail
          set +e
          pnpm dlx @argos-ci/cli upload --token "$ARGOS_TOKEN" ./screenshots/ 2>&1 | tee argos-upload.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Argos upload failed with exit code $status"
            tail -n 200 argos-upload.log || true
            echo "### Argos upload failed (exit code $status)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 200 argos-upload.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # Don't fail the workflow; we've recorded the failure in the step summary.
          exit 0
