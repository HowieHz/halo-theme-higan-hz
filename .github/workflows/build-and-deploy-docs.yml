name: Build and Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  release:
    types: [published]
  repository_dispatch:
    types: [stable_release_published]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Halo after build"
        required: true
        type: boolean
        default: false

concurrency:
  # 动态组名：
  # - 当事件会导致 deploy job 运行时 → 'production' 组（串行）
  # - 其他情况 → 'build-only-<sha>' 组（每个提交唯一，可并发）
  group: |
    ${{
      (
        (github.event_name == 'release' && github.event.action == 'published' && github.event.release.target_commitish == 'main') ||
        (github.event_name == 'repository_dispatch' && github.event.action == 'stable_release_published' && github.event.client_payload.target_branch == 'main' && github.event.client_payload.deploy_docs == true) ||
        (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'deploy-docs')) ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
      ) && 'production' || format('build-only-{0}', github.sha)
    }}
  cancel-in-progress: false # 等待当前组任务完成，不自动取消（唯一组不受影响）

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.release_sha || github.sha }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Documentation
        run: pnpm docs:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: docs-dist
          path: docs/.vitepress/dist

  deploy:
    needs: build
    if: |
      (github.event_name == 'release' && github.event.action == 'published' && github.event.release.target_commitish == 'main') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'stable_release_published' && github.event.client_payload.target_branch == 'main' && github.event.client_payload.deploy_docs == true) ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'deploy-docs')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.release_sha || github.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: docs-dist
          path: docs/.vitepress/dist

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Deploy Doc to Halo
        run: |
          pnpm --package=halo-static-pages-deploy-cli dlx halo-static-pages-deploy deploy -e ${{ secrets.DOCS_ENDPOINT }} -i ${{ secrets.DOCS_ID }} -t ${{ secrets.DOCS_PAT }} -f docs/.vitepress/dist
