name: Build and Deploy Documentation

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Halo after build"
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Documentation
        run: pnpm docs:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs/.vitepress/dist

  deploy:
    needs: build
    if: |
      (github.event_name == 'release' && github.event.action == 'published' && github.event.release.target_commitish == 'main') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'deploy-docs')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: docs/.vitepress/dist

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Deploy Doc to Halo
        run: |
          pnpm --package=halo-static-pages-deploy-cli dlx halo-static-pages-deploy deploy -e ${{ secrets.DOCS_ENDPOINT }} -i ${{ secrets.DOCS_ID }} -t ${{ secrets.DOCS_PAT }} -f docs/.vitepress/dist
