name: Reusable Build Theme

on:
  workflow_call:
    inputs:
      theme_ref:
        required: false
        type: string
        default: refs/heads/main
        description: "Git ref/sha to checkout for building"
      version_override:
        required: false
        type: string
        default: ""
        description: "Optional theme version override applied before build"
      artifact_name:
        required: false
        type: string
        default: theme-artifact
        description: "Name of uploaded artifact"
      include_list_path:
        required: false
        type: string
        default: .github/include-list.txt
        description: "Path of include list file in repository"

jobs:
  build:
    name: Build and Upload Theme
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Add swap space
        run: |
          SWAP_FILE="/tmp/github-actions-swap-$$"
          MEMORY_LIMIT_GB=12
          # Add swap space to help with memory issues during build
          sudo fallocate -l ${MEMORY_LIMIT_GB}G "$SWAP_FILE"
          sudo chmod 600 "$SWAP_FILE"
          sudo mkswap "$SWAP_FILE"
          sudo swapon "$SWAP_FILE"
          echo "Added ${MEMORY_LIMIT_GB}GB swap at $SWAP_FILE"
          free -h

      - name: Make Build Directory
        run: |
          mkdir -p dist/theme-packages

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ inputs.theme_ref }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Override theme version
        if: inputs.version_override != ''
        run: node .github/scripts/update-theme-version.js "${{ inputs.version_override }}"

      - name: Build project
        run: pnpm build

      - name: Build theme archives (CN and EN)
        shell: bash
        run: bash .github/scripts/build-theme-packages.sh "${{ inputs.include_list_path }}" "$GITHUB_WORKSPACE/dist/theme-packages"

      - name: Upload Theme Build Target
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/theme-packages/*

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-path: dist/theme-packages/*.zip
