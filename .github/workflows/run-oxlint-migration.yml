name: Run Oxlint Migration

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # https://github.com/actions/checkout/releases/tag/v7.0.1

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update oxlint packages
        run: pnpm update -r oxlint@latest oxlint-tsgolint@latest

      - name: Run oxlint migration
        run: pnpm run migrate:oxlint

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.1
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          # Use a PAT instead of GITHUB_TOKEN so the created PR can trigger other workflows
          # Required permissions (fine-grained PAT):
          # - Contents: Read and Write (create branches and commits)
          # - Pull requests: Read and Write (create PRs)
          # - Workflows: Read and Write (allow PRs to trigger workflows)
          commit-message: "chore: update oxlint configuration"
          title: "chore: update oxlint configuration"
          body: |
            This PR updates the oxlint configuration by running the migration tool.

            Generated automatically by the oxlint-migrate workflow.
          branch: chore/oxlint-migrate
          delete-branch: true
          labels: dependencies
          add-paths: |
            .oxlintrc.json
            package.json
            pnpm-lock.yaml
