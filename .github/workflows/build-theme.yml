name: Build Theme
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Upload Theme
    permissions:
      contents: read
    # PR builds execute untrusted branch code, so they must not use the attesting workflow with OIDC permissions.
    uses: ./.github/workflows/reusable-build-theme-untrusted.yml
    with:
      theme_ref: ${{ github.sha }}
      artifact_name: theme-artifact
