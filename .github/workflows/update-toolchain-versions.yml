name: Update Toolchain Versions

on:
  schedule:
    # 21:00 UTC = 05:00 Asia/Shanghai on the next day.
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: update-toolchain-versions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Update toolchain versions
        id: update-toolchain
        run: node .github/scripts/update-toolchain-versions.js

      - name: Create Pull Request
        if: ${{ steps.update-toolchain.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}
          commit-message: "chore: update node and pnpm versions"
          title: "chore: update node and pnpm versions"
          body: |
            This PR updates the repository toolchain versions tracked in:
            - `package.json`
            - `.github/actions/**/action.yml`
            - workflows that bootstrap Node.js directly

            Resolved by automation:
            - Node.js major: `${{ steps.update-toolchain.outputs.node_major }}`
            - pnpm version: `${{ steps.update-toolchain.outputs.pnpm_version }}`
          branch: chore/update-toolchain-versions
          delete-branch: true
          labels: dependencies
