name: Update Toolchain Versions

on:
  schedule:
    # 21:00 UTC = 05:00 Asia/Shanghai on the next day.
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: update-toolchain-versions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # https://github.com/actions/setup-node/releases/tag/v7.0.0
        with:
          node-version: 24

      - name: Update toolchain versions
        id: update-toolchain
        run: node .github/scripts/update-toolchain-versions.js

      - name: Create Pull Request
        if: ${{ steps.update-toolchain.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.1
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}
          commit-message: "chore: update node and pnpm versions"
          title: "chore: update node and pnpm versions"
          body: |
            This PR updates the repository toolchain versions tracked in:
            - `package.json`
            - `.github/actions/**/action.yml`
            - workflows that bootstrap Node.js directly

            Resolved by automation:
            - Node.js major: `${{ steps.update-toolchain.outputs.node_major }}`
            - pnpm version: `${{ steps.update-toolchain.outputs.pnpm_version }}`
          branch: chore/update-toolchain-versions
          delete-branch: true
          labels: dependencies
