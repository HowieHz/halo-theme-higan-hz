name: Page Resource Size Diff Check (Issue Comment Triggered)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Check comment permissions and trigger conditions
  check-trigger:
    name: Check Trigger Conditions
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/audit')
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.pr.outputs.number }}
      pr_head_sha: ${{ steps.pr.outputs.head_sha }}
      pr_head_ref: ${{ steps.pr.outputs.head_ref }}
      comment_id: ${{ github.event.comment.id }}
      eyes_reaction_id: ${{ steps.add-reaction.outputs.reaction_id }}

    steps:
      - name: Add reaction to comment
        id: add-reaction
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            const reaction = await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            core.setOutput('reaction_id', reaction.data.id);

      - name: Check if commenter has write access
        id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.comment.user.login
              });
              
              const hasWriteAccess = ['admin', 'maintain', 'write'].includes(permission.permission);
              
              if (!hasWriteAccess) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: '❌ You do not have permission to trigger this workflow. Only users with write, maintain, or admin access can use the `/audit` command.'
                });
                core.setOutput('should_run', 'false');
                return;
              }
              
              core.setOutput('should_run', 'true');
            } catch (error) {
              core.setFailed(`Permission check failed: ${error.message}`);
            }

      - name: Get PR details
        if: steps.check.outputs.should_run == 'true'
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('number', pr.number);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);

            console.log(`PR #${pr.number}`);
            console.log(`Head SHA: ${pr.head.sha}`);
            console.log(`Head Ref: ${pr.head.ref}`);

  # Get latest release version
  get-latest-release:
    name: Get Latest Release
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Get latest release
        id: release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            try {
              const { data: release } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              
              core.setOutput('tag', release.tag_name);
              
              // Get the commit SHA for the release tag
              const { data: tag } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${release.tag_name}`
              });
              
              core.setOutput('sha', tag.object.sha);
              
              console.log(`Latest Release: ${release.tag_name}`);
              console.log(`Release SHA: ${tag.object.sha}`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed('No release found. Ensure the repository has at least one release.');
              } else {
                core.setFailed(`Failed to get latest release: ${error.message}`);
              }
            }

  # Page resource size diff check
  audit:
    name: Page Resource Size Diff Check (${{ matrix.ref_name }})
    needs: [check-trigger, get-latest-release]
    if: needs.check-trigger.outputs.should_run == 'true'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - ref_name: current
            ref: ${{ needs.check-trigger.outputs.pr_head_sha }}
          - ref_name: latest-release
            ref: ${{ needs.get-latest-release.outputs.release_sha }}
      fail-fast: false

    uses: ./.github/workflows/reusable-site-audit.yml
    with:
      theme_ref: ${{ matrix.ref }}
      ref_name: ${{ matrix.ref_name }}
      run_lighthouse_ci: true

  # Compare and comment
  compare-and-comment:
    name: Compare and Comment
    needs: [check-trigger, get-latest-release, audit]
    if: |
      always() &&
      needs.check-trigger.outputs.should_run == 'true' &&
      needs.audit.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download current reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: page-size-reports-current
          path: ./reports-current

      - name: Download latest-release reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: page-size-reports-latest-release
          path: ./reports-latest-release

      - name: Generate comparison report
        run: |
          node .github/scripts/compare-page-size-reports.js
        env:
          CURRENT_REPORT: ./reports-current/page-size-report.json
          BASE_REPORT: ./reports-latest-release/page-size-report.json
          OUTPUT_FILE: ./comparison-report.md

      - name: Add header to report
        run: |
          RELEASE_TAG="${{ needs.get-latest-release.outputs.release_tag }}"
          PR_SHA="${{ needs.check-trigger.outputs.pr_head_sha }}"

          cat > ./final-report.md << EOF
          # 📊 Page Resource Size Diff Report

          **Comparison:** Current PR version vs latest stable release (\`${RELEASE_TAG}\`)

          - **Current PR**: [\`${PR_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${PR_SHA})
          - **Latest Release**: [\`${RELEASE_TAG}\`](https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG})

          ---

          EOF

          cat ./comparison-report.md >> ./final-report.md

      - name: Add success reaction and comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('./final-report.md', 'utf8');

            // Add success reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.check-trigger.outputs.comment_id }},
              content: '+1'
            });

            // Post comment
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.check-trigger.outputs.pr_number }},
                body: report
              });
              console.log('✓ Page resource size diff report posted successfully');
            } catch (error) {
              if (error.status === 403) {
                console.log('⚠️ Cannot post comment (insufficient permissions).');
                console.log('📊 The report has been generated and uploaded as an artifact; it can be viewed manually.');
              } else {
                throw error;
              }
            }

      - name: Add failure reaction and comment on failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            // Add failure reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.check-trigger.outputs.comment_id }},
              content: '-1'
            });

            // Post failure notification
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.check-trigger.outputs.pr_number }},
              body: '❌ Report generation failed. See the [workflow run logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });

  # Handle failure cases
  handle-failure:
    name: Handle Failure
    needs: [check-trigger, audit]
    if: |
      always() &&
      needs.check-trigger.outputs.should_run == 'true' &&
      needs.audit.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add failure reaction and comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            // Add failure reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ needs.check-trigger.outputs.comment_id }},
              content: '-1'
            });

            // Post failure notification
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.check-trigger.outputs.pr_number }},
              body: '❌ Page resource size diff check failed. See the [workflow run logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });

  cleanup-reaction:
    name: Remove In-Progress Reaction
    needs: [check-trigger, get-latest-release, audit, compare-and-comment, handle-failure]
    if: |
      always() &&
      needs.check-trigger.outputs.eyes_reaction_id != ''
    runs-on: ubuntu-latest
    steps:
      - name: Remove eyes reaction
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        with:
          script: |
            try {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: ${{ needs.check-trigger.outputs.comment_id }},
                reaction_id: ${{ needs.check-trigger.outputs.eyes_reaction_id }}
              });
              console.log('✓ Removed eyes reaction');
            } catch (error) {
              if (error.status === 404) {
                console.log('ℹ️ Eyes reaction already removed');
              } else {
                throw error;
              }
            }
