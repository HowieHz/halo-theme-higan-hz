name: Reusable Build Theme Without Attestation

on:
  workflow_call:
    inputs:
      theme_ref:
        required: false
        type: string
        default: refs/heads/main
        description: "Git ref/sha to checkout for building"
      version_override:
        required: false
        type: string
        default: ""
        description: "Optional theme version override applied before build"
      artifact_name:
        required: false
        type: string
        default: theme-artifact
        description: "Name of uploaded artifact"
      include_list_path:
        required: false
        type: string
        default: .github/include-list.txt
        description: "Path of include list file in repository"

jobs:
  build:
    name: Build Theme Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          ref: ${{ inputs.theme_ref }}

      - name: Build Theme Packages
        uses: ./.github/actions/build-theme-packages
        with:
          version_override: ${{ inputs.version_override }}
          include_list_path: ${{ inputs.include_list_path }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/theme-packages/*
