name: Upload Visual Regression Screenshots to Argos

on:
  workflow_run:
    workflows: ["Visual Regression (Issue Comment Triggered)"]
    types: [completed]

jobs:
  upload:
    name: Download screenshots and upload to Argos
    # Only run when the generator workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download screenshots
        id: dl-screenshots
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          pattern: screenshots-*
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./screenshots

      - name: Download Argos context
        id: dl-argos-context
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: argos-context
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ./argos-context

      - name: Resolve Argos git context
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # https://github.com/actions/github-script/releases/tag/v8
        env:
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const envFile = process.env.GITHUB_ENV;
            const fs = require('node:fs');
            const path = require('node:path');
            const workflowRun = context.payload.workflow_run;
            const fallback = {
              branch: process.env.WORKFLOW_RUN_HEAD_BRANCH,
              commit: process.env.WORKFLOW_RUN_HEAD_SHA,
            };

            const append = (key, value) => {
              if (value !== undefined && value !== null && value !== '') {
                fs.appendFileSync(envFile, `${key}=${value}\n`);
              }
            };

            const contextPath = path.join(process.cwd(), 'argos-context', 'argos-context.json');
            if (fs.existsSync(contextPath)) {
              const artifactContext = JSON.parse(fs.readFileSync(contextPath, 'utf8'));
              append('ARGOS_BRANCH', artifactContext.head_ref);
              append('ARGOS_COMMIT', artifactContext.head_sha);
              append('ARGOS_PR_NUMBER', String(artifactContext.pr_number || ''));
              append('ARGOS_PR_HEAD_COMMIT', artifactContext.head_sha);
              append('ARGOS_PR_BASE_BRANCH', artifactContext.base_ref);
              append('ARGOS_REFERENCE_BRANCH', artifactContext.base_ref);
              core.info(`Resolved Argos context from artifact: ${artifactContext.head_ref} @ ${artifactContext.head_sha}`);
              return;
            }

            core.info(`No Argos context artifact found; using workflow_run branch ${fallback.branch}.`);
            append('ARGOS_BRANCH', fallback.branch);
            append('ARGOS_COMMIT', fallback.commit);

      - name: Ensure screenshots present
        run: |
          if [ ! -d screenshots ] || [ -z "$(ls -A screenshots 2>/dev/null)" ]; then
            echo "No screenshots downloaded from run ${{ github.event.workflow_run.id }}."
            exit 1
          fi

      - name: Upload to Argos
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          if [ -z "$ARGOS_TOKEN" ]; then
            echo "ARGOS_TOKEN not set; skipping upload to Argos"
            echo "### Argos upload skipped: ARGOS_TOKEN not set" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "Uploading screenshots to Argos"
          echo "Argos branch: ${ARGOS_BRANCH:-unknown}"
          echo "Argos commit: ${ARGOS_COMMIT:-unknown}"
          echo "Argos reference branch: ${ARGOS_REFERENCE_BRANCH:-unknown}"
          # Ensure we capture the exit status of the upload pipeline instead of exiting
          # immediately due to the runner's default `set -e` behavior.
          set -o pipefail
          set +e
          cmd=(pnpm dlx @argos-ci/cli upload --token "$ARGOS_TOKEN")
          cmd+=(./screenshots/)
          "${cmd[@]}" 2>&1 | tee argos-upload.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Argos upload failed with exit code $status"
            tail -n 200 argos-upload.log || true
            echo "### Argos upload failed (exit code $status)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 200 argos-upload.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # Don't fail the workflow; we've recorded the failure in the step summary.
          exit 0
