# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Asia/Shanghai"
    groups:
      runtime-deps:
        dependency-type: "production"
        patterns:
          - "alpinejs"
          - "instant.page"
          - "mermaid"
          - "chart.js"
          - "vue-chartjs"
        update-types:
          - "minor"
          - "patch"
      docs-stack:
        dependency-type: "development"
        patterns:
          - "vitepress"
          - "vitepress-plugin-*"
          - "pagefind"
          - "@nolebase/*"
          - "@whyframe/*"
          - "vue"
        update-types:
          - "minor"
          - "patch"
      tooling:
        dependency-type: "development"
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "oxlint"
          - "oxlint-*"
          - "oxfmt"
          - "stylelint"
          - "stylelint-*"
          - "markdownlint-cli"
          - "autocorrect-node"
          - "vue-eslint-parser"
          - "vite"
          - "vite-plugin-*"
          - "tailwindcss"
          - "tailwindcss-*"
          - "@tailwindcss/*"
          - "unplugin-tailwindcss-mangle"
          - "@iconify/*"
          - "@iconify-json/*"
          - "less"
          - "lightningcss"
          - "browserslist"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      misc-dev:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      misc-prod:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  # This group only updates third-party GitHub Actions referenced in .github/workflows.
  # Dependabot does not automatically update dependencies used inside local composite actions
  # such as .github/actions/**/action.yml.
  # Those files are updated separately by .github/workflows/update-local-action-uses.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Asia/Shanghai"
    groups:
      github-actions:
        patterns:
          - "*"
