name: Build Theme Packages
description: Build all theme package variants into dist/theme-packages
inputs:
  version_override:
    description: Optional theme version override applied before build
    required: false
    default: ""
  include_list_path:
    description: Path of include list file in repository
    required: false
    default: .github/include-list.txt
runs:
  using: composite
  steps:
    - name: Set Up Swap
      shell: bash
      run: |
        SWAP_FILE="/tmp/github-actions-swap-$$"
        MEMORY_LIMIT_GB=12
        # Add swap space to help with memory issues during build
        sudo fallocate -l ${MEMORY_LIMIT_GB}G "$SWAP_FILE"
        sudo chmod 600 "$SWAP_FILE"
        sudo mkswap "$SWAP_FILE"
        sudo swapon "$SWAP_FILE"
        echo "Added ${MEMORY_LIMIT_GB}GB swap at $SWAP_FILE"
        free -h

    - name: Prepare Dist
      shell: bash
      run: |
        rm -rf dist/theme-packages
        mkdir -p dist/theme-packages

    - name: Set Up Node
      uses: ./.github/actions/setup-node-pnpm

    - name: Install Deps
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Set Version
      if: inputs.version_override != ''
      shell: bash
      run: node .github/scripts/update-theme-version.js "${{ inputs.version_override }}"

    - name: Build Full
      shell: bash
      run: pnpm build:full

    - name: Pack Full
      shell: bash
      run: bash .github/scripts/build-theme-packages.sh "${{ inputs.include_list_path }}" "$GITHUB_WORKSPACE/dist/theme-packages" "$GITHUB_WORKSPACE/templates" "-full-precompressed"

    - name: Prepare Default Templates
      id: default-templates
      shell: bash
      run: |
        DEFAULT_TEMPLATES_DIR="$RUNNER_TEMP/templates-default"
        rm -rf "$DEFAULT_TEMPLATES_DIR"
        mkdir -p "$DEFAULT_TEMPLATES_DIR"
        cp -a "$GITHUB_WORKSPACE/templates/." "$DEFAULT_TEMPLATES_DIR/"
        find "$DEFAULT_TEMPLATES_DIR" -type f \( -name '*.gz' -o -name '*.zst' \) -delete
        echo "path=$DEFAULT_TEMPLATES_DIR" >> "$GITHUB_OUTPUT"

    - name: Pack Default
      shell: bash
      run: bash .github/scripts/build-theme-packages.sh "${{ inputs.include_list_path }}" "$GITHUB_WORKSPACE/dist/theme-packages" "${{ steps.default-templates.outputs.path }}"

    - name: Build Tiny
      shell: bash
      run: pnpm build:tiny

    - name: Prepare Tiny Templates
      id: tiny-templates
      shell: bash
      run: |
        TINY_TEMPLATES_DIR="$RUNNER_TEMP/templates-tiny"
        rm -rf "$TINY_TEMPLATES_DIR"
        mkdir -p "$TINY_TEMPLATES_DIR"
        cp -a "$GITHUB_WORKSPACE/templates/." "$TINY_TEMPLATES_DIR/"
        find "$TINY_TEMPLATES_DIR" -type f \( -name '*.br' -o -name '*.gz' -o -name '*.zst' \) -delete
        find "$TINY_TEMPLATES_DIR" -type f \( -name '*.woff' -o -name '*.woff.*' -o -name '*.ttf' -o -name '*.ttf.*' \) -delete
        rm -f "$TINY_TEMPLATES_DIR/assets/images"/logo.*
        mkdir -p "$TINY_TEMPLATES_DIR/assets/images"
        cp "$GITHUB_WORKSPACE/.github/assets/1x1_#FFFFFFFF.png" "$TINY_TEMPLATES_DIR/assets/images/logo.png"
        echo "path=$TINY_TEMPLATES_DIR" >> "$GITHUB_OUTPUT"

    - name: Pack Tiny
      shell: bash
      run: bash .github/scripts/build-theme-packages.sh "${{ inputs.include_list_path }}" "$GITHUB_WORKSPACE/dist/theme-packages" "${{ steps.tiny-templates.outputs.path }}" "-tiny"
