name: Setup Node.js and pnpm
description: Detect packageManager, setup pnpm, then setup Node.js with pnpm cache
inputs:
  node-version:
    description: Node.js version for setup-node
    required: false
    default: "25"
  pnpm-version:
    description: Fallback pnpm version when packageManager is missing
    required: false
    default: "10.33.0"
runs:
  using: composite
  steps:
    - name: Detect package manager in package.json
      id: detect-pm
      shell: bash
      run: |
        pm=""
        if [ -f package.json ]; then
          # If packageManager value starts with pnpm@, extract the full pnpm@... token
          if grep -Eq '"packageManager"[[:space:]]*:[[:space:]]*"[[:space:]]*pnpm@' package.json; then
            pm=$(sed -n 's/.*"packageManager"[[:space:]]*:[[:space:]]*"[[:space:]]*\(pnpm@[^"]*\)".*/\1/p' package.json || true)
          fi
        fi
        echo "pm=${pm}" >> "$GITHUB_OUTPUT"

    - name: Setup pnpm (normal, when packageManager declares pnpm)
      if: ${{ steps.detect-pm.outputs.pm != '' && contains(steps.detect-pm.outputs.pm, 'pnpm') }}
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # https://github.com/pnpm/action-setup/releases/tag/v5.0.0

    - name: Setup pnpm (fallback when packageManager missing)
      if: ${{ steps.detect-pm.outputs.pm == '' }}
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # https://github.com/pnpm/action-setup/releases/tag/v5.0.0
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # https://github.com/actions/setup-node/releases/tag/v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
