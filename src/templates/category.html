<!doctype html>
<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{components/base-layout/template :: html(
    title = ${#annotations.getOrDefault(category, 'higan.howiehz.top/page-title', category.spec?.displayName)}, 
    head = ~{:: head},
    content = ~{:: body}, 
    header = ~{components/header/template :: body}, 
    navbar = ~{}, 
    language=${#annotations.get(category, 'higan.howiehz.top/page-language')} 
  )}"
>
  <head th:remove="tag">
    <link
      th:if="${pluginFinder.available('PluginFeed')}"
      rel="alternate"
      type="application/rss+xml"
      th:title="'Posts - Category: ' + ${category.spec?.displayName}"
      th:href="@{'/feed/categories/' + ${category.spec?.slug} + '.xml'}"
    />
    <link
      rel="canonical"
      th:if="${theme.config?.category_page_styles?.is_enable_canonical_link}"
      th:href="${siteUrl} + @{{prefix}/{slug}(prefix = ${site.routes.categoriesUri}, slug = ${category.spec?.slug})}"
    />
    <script src="/page-components/category/index.ts" type="module"></script>
    <th:block th:insert="~{components/header/template :: head}"></th:block>
    <th:block th:insert="~{components/list-post-simple/template :: head(showPagination = true)}"></th:block>
  </head>
  <body th:remove="tag">
    <div id="archive" class="content flex-auto">
      <h1>
        <span th:text="#{page.category.title(${category.spec?.displayName})}">分类页标题替换位</span>
        <th:block
          th:if="${pluginFinder.available('PluginFeed') and theme.config?.category_page_styles?.is_show_rss_button}"
        >
          <a
            class="icon"
            th:aria-label="#{common.subscribeThisPage}"
            th:href="@{'/feed/categories/' + ${category.spec?.slug} + '.xml'}"
            target="_blank"
            rel="noopener"
          >
            <span class="iconify-large iconify heroicons-outline--rss"></span
          ></a>
        </th:block>
      </h1>

      <th:block
        th:insert="~{components/list-post-simple/template :: body(posts = ${posts}, showPagination = true, pageTemplateName = 'category')}"
      ></th:block>
    </div>
  </body>
</th:block>
