<html
  xmlns:th="http://www.thymeleaf.org"
  th:with="color_schema = ${theme.config?.styles?.color_schema},
           theme_auto = ${theme.config?.styles?.theme_auto},
           theme_light = ${theme.config?.styles?.theme_light},
           theme_dark = ${theme.config?.styles?.theme_dark},
           custom_color_schema_config = ${theme.config?.styles?.custom_color_schema},
           custom_color_schema_init_id = ${theme.config?.styles?.custom_color_schema_init_id},
           custom_theme_auto_id = ${theme.config?.styles?.custom_theme_auto_id},
           custom_theme_light_id = ${theme.config?.styles?.custom_theme_light_id},
           custom_theme_dark_id = ${theme.config?.styles?.custom_theme_dark_id},
           page_language=${'' + param.language != '' ? '' + param.language : (language ?: (theme.config?.global?.default_page_language ?: 'zh-CN'))},
           siteUrl = ${#strings.substring(site.url, #strings.length(site.url) - 1) == '/'
                       ? #strings.substring(site.url, 0, #strings.length(site.url) - 1)
                       : site.url},
           isSidebar = ${theme.config?.styles?.footer_content_sidebar_position != 'inline'},
           isBottomSidebarContent = ${theme.config?.styles?.is_footer_content_show
                                      or theme.config?.styles?.is_18n_footer_content_show}"
  th:lang="${page_language}"
  th:attr="data-color-scheme = ${color_schema} == 'custom' ? 'auto' :
                               (${color_schema} == 'auto' ? 'auto' :
                               (${color_schema} == 'light' ? 'light' :
                               (${color_schema} == 'dark' ? 'dark' :
                               (${color_schema} == 'auto-blue' ? 'auto' :
                               (${color_schema} == 'light-blue' ? 'light' :
                               (${color_schema} == 'dark-blue' ? 'dark' :
                               (${color_schema} == 'gray' ? 'light' : 'auto'))))))),
           theme = ${color_schema} != 'custom' ? ${color_schema} : 'theme-'+${custom_color_schema_init_id}"
  th:fragment="html"
>
  <!--/* th:fragment="html (title, head, content, header, navbar, language)" */-->
  <head>
    <meta charset="utf-8" />
    <meta
      th:if="${theme.config?.global?.upgrade_insecure_requests}"
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <style>
      @layer theme, base, properties, utilities;
    </style>
    <th:block
      th:if="${theme.config?.global?.is_performance_monitor_enable}"
      th:insert="~{components/performance-monitor/template :: head}"
    ></th:block>
    <!--/* 
      The <meta name="theme-color"> tag must not be self-closing;
      otherwise, it will not work on Chrome for Android. 
    */-->
    <th:block th:insert="~{components/meta-theme-color/template :: head}"></th:block>
    <meta
      name="color-scheme"
      content="light dark"
    />
    <title th:text="${#strings.defaultString(title, site.title)}"></title>
    <!--/* RSS link declaration start */-->
    <!--/*
      RSS <link> 输出逻辑：
      1. 有 PluginFeed 插件 + sns 设置了 /rss.xml  → 仅输出 Posts-All，sns 不重复输出
      2. 有 PluginFeed 插件 + sns 设置了其他地址   → 输出 Posts-All，同时输出 sns 的 RSS
      3. 有 PluginFeed 插件 + 未设置 sns           → 仅输出 Posts-All
      4. 无 PluginFeed 插件 + 设置了 sns           → 仅输出 sns 的 RSS（无论地址是什么）
    */-->
    <th:block th:if="${pluginFinder.available('PluginFeed')}">
      <link
        rel="alternate"
        type="application/rss+xml"
        title="Posts - All"
        th:href="@{'/rss.xml'}"
      />
    </th:block>
    <th:block th:each="item : ${theme.config?.sns?.sns_list}">
      <th:block
        th:if="${item?.type == 'rss'}"
        th:with="href = ${item?.input_value}"
      >
        <link
          th:if="${href != '/rss.xml' or !pluginFinder.available('PluginFeed')}"
          rel="alternate"
          type="application/rss+xml"
          title="RSS feed"
          th:href="@{${href}}"
        />
      </th:block>
    </th:block>
    <!--/* RSS link declaration end */-->
    <!--/* Custom Font Declarations start */-->
    <th:block th:if="${theme.config?.styles?.is_custom_font_files_enable}">
      <!--/* Custom Font Preload Declarations start */-->
      <th:block
        th:each="fontConfig : ${theme.config?.styles?.custom_font_configs}"
        th:with="fontFile = ${fontConfig.font_file},
                fontExt = ${fontFile.substring(fontFile.lastIndexOf('.') + 1)},
                fontMime = ${fontExt == 'woff2'
                             ? 'font/woff2'
                             : (fontExt == 'woff'
                                ? 'font/woff'
                                : (fontExt == 'ttf'
                                   ? 'font/ttf'
                                   : (fontExt == 'otf'
                                      ? 'font/otf'
                                      : (fontExt == 'sfnt'
                                         ? 'font/sfnt'
                                         : (fontExt == 'eot'
                                            ? 'application/vnd.ms-fontobject'
                                            : ((fontExt == 'ttc'
                                                or fontExt == 'otc')
                                               ? 'font/collection'
                                               : 'application/octet-stream'))))))}"
      >
        <link
          rel="preload"
          th:href="${fontFile}"
          as="font"
          th:type="${fontMime}"
          crossorigin
        />
      </th:block>
      <!--/* Custom Font Preload Declarations end */-->
      <!--/* Custom Font @font-face Declarations start */-->
      <th:block
        th:if="${theme.config?.styles?.is_custom_font_files_enable}"
        th:insert="~{components/custom-font-face-style/template :: body}"
      ></th:block>
      <!--/* Custom Font @font-face Declarations end */-->
      <!--/* Custom Font font-family Declarations start */-->
      <style>
        :root {
          --higan-font-family:
            custom, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif,
            "Apple Color Emoji", "Segoe UI Emoji" !important;
        }

        :root.webkit {
          --higan-font-family: custom !important;
        }
      </style>
      <!--/* Custom Font font-family Declarations end */-->
    </th:block>
    <!--/* Custom Font Declarations end */-->
    <!--/* WebKit Detection start */-->
    <script>
      (function (userAgent) {
        if (!/(apple)?webkit\/537\.36/i.test(userAgent) && /(apple)?webkit/i.test(userAgent)) {
          document.documentElement.classList.add("webkit");
        }
      })(navigator.userAgent);
    </script>
    <!--/* WebKit Detection end */-->
    <!--/* footer-sidebar head start */-->
    <th:block
      th:insert="~{components/footer-sidebar/template :: head(
                    isSidebar = ${isSidebar},
                    isBottomSidebarContent = ${isBottomSidebarContent}
                  )}"
    >
    </th:block>
    <!--/* footer-sidebar head end */-->
    <!--/* Custom Cursor Declarations start */-->
    <th:block
      th:if="${theme.config?.styles?.is_custom_cursor_files_enable}"
      th:insert="~{components/custom-cursor-style/template :: body}"
    ></th:block>
    <th:block th:unless="${theme.config?.styles?.is_custom_cursor_files_enable}">
      <style>
        .v-cursor-pointer {
          cursor: pointer;
        }
      </style>
    </th:block>
    <!--/* Custom Cursor Declarations end */-->
    <!--/* Generate the allCustomColorSchema array to set the data-color-scheme attribute */-->
    <th:block
      th:if="${color_schema == 'custom'
               or theme_dark == 'custom'
               or theme_light == 'custom'
               or theme_auto == 'custom'}"
      th:insert="~{components/custom-color-schema-config/template :: head}"
    ></th:block>
    <!--/* Generate the allCustomColorSchema array to set the data-color-scheme attribute */-->
    <!--/* set data-color-scheme attribute for custom color schema start */-->
    <script
      th:if="${color_schema == 'custom'}"
      th:data-custom-color-schema-init-id="${custom_color_schema_init_id}"
    >
      (function (dataset) {
        /* eslint-disable-next-line no-undef -- Defined earlier by components/custom-color-schema-config/template.html. */
        const matchedSchema = allCustomColorSchema.find((schema) => schema.id === dataset?.customColorSchemaInitId);
        if (!matchedSchema?.type) {
          return;
        }
        document.documentElement.setAttribute("data-color-scheme", matchedSchema.type);
      })(document.currentScript?.dataset);
    </script>
    <!--/* set data-color-scheme attribute for custom color schema end */-->
    <!--/* Custom Theme Declarations start */-->
    <th:block
      th:if="${!#lists.isEmpty(custom_color_schema_config)
               and (color_schema == 'custom'
                    or theme_dark == 'custom'
                    or theme_light == 'custom'
                    or theme_auto == 'custom')}"
    >
      <th:block th:each="colorSchema : ${custom_color_schema_config}">
        <th:block
          th:if="${custom_color_schema_init_id == colorSchema.id or 
                   custom_theme_auto_id == colorSchema.id or 
                   custom_theme_light_id == colorSchema.id or 
                   custom_theme_dark_id == colorSchema.id}"
        >
          <!--/* Color Scheme Declarations Start */-->
          <th:block
            th:if="${colorSchema.type == 'dark'}"
            th:insert="~{components/color-scheme-dark/template :: head}"
          ></th:block>
          <th:block
            th:if="${colorSchema.type == 'light'}"
            th:insert="~{components/color-scheme-light/template :: head}"
          ></th:block>
          <th:block
            th:if="${colorSchema.type == 'auto'}"
            th:insert="~{components/color-scheme-auto/template :: head}"
          ></th:block>
          <!--/* Color Scheme Declarations End */-->
          <!--/* Theme Color CSS Variables Declarations Start */-->
          <th:block
            th:insert="~{components/custom-color-schema-style/template :: body(colorSchema=${colorSchema})}"
          ></th:block>
          <!--/* Theme Color CSS Variables Declarations End */-->
        </th:block>
      </th:block>
    </th:block>
    <!--/* Custom Theme Declarations end */-->
    <!--/* Preset Themes' Color Scheme Declarations start */-->
    <th:block th:unless="${theme.config?.styles?.is_show_color_scheme_toggle_button}">
      <th:block
        th:if="${color_schema == 'light'
                 or color_schema == 'light-blue'
                 or color_schema == 'gray'}"
        th:insert="~{components/color-scheme-light/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'dark'
                 or color_schema == 'dark-blue'}"
        th:insert="~{components/color-scheme-dark/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'auto'
                 or color_schema == 'auto-blue'}"
        th:insert="~{components/color-scheme-auto/template :: head}"
      ></th:block>
    </th:block>
    <th:block th:if="${theme.config?.styles?.is_show_color_scheme_toggle_button}">
      <th:block
        th:if="${theme_dark == 'light'
                 or theme_light == 'light'
                 or theme_auto == 'light'
                 or color_schema == 'light'
                 or theme_dark == 'light-blue'
                 or theme_light == 'light-blue'
                 or theme_auto == 'light-blue'
                 or color_schema == 'light-blue'
                 or theme_dark == 'gray'
                 or theme_light == 'gray'
                 or theme_auto == 'gray'
                 or color_schema == 'gray'}"
        th:insert="~{components/color-scheme-light/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'dark'
                 or theme_light == 'dark'
                 or theme_auto == 'dark'
                 or color_schema == 'dark'
                 or theme_dark == 'dark-blue'
                 or theme_light == 'dark-blue'
                 or theme_auto == 'dark-blue'
                 or color_schema == 'dark-blue'}"
        th:insert="~{components/color-scheme-dark/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'auto'
                 or theme_light == 'auto'
                 or theme_auto == 'auto'
                 or color_schema == 'auto'
                 or theme_dark == 'auto-blue'
                 or theme_light == 'auto-blue'
                 or theme_auto == 'auto-blue'
                 or color_schema == 'auto-blue'}"
        th:insert="~{components/color-scheme-auto/template :: head}"
      ></th:block>
    </th:block>
    <!--/* Preset Themes' Color Scheme Declarations end */-->
    <!--/* Preset Themes' Color CSS Variables Declarations start */-->
    <th:block th:unless="${theme.config?.styles?.is_show_color_scheme_toggle_button}">
      <th:block
        th:if="${color_schema == 'auto-blue'}"
        th:insert="~{components/theme-auto-blue/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'auto'}"
        th:insert="~{components/theme-auto/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'dark-blue'}"
        th:insert="~{components/theme-dark-blue/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'dark'}"
        th:insert="~{components/theme-dark/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'gray'}"
        th:insert="~{components/theme-gray/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'light-blue'}"
        th:insert="~{components/theme-light-blue/template :: head}"
      ></th:block>
      <th:block
        th:if="${color_schema == 'light'}"
        th:insert="~{components/theme-light/template :: head}"
      ></th:block>
    </th:block>
    <th:block th:if="${theme.config?.styles?.is_show_color_scheme_toggle_button}">
      <th:block
        th:if="${theme_dark == 'auto-blue'
                 or theme_light == 'auto-blue'
                 or theme_auto == 'auto-blue'
                 or color_schema == 'auto-blue'}"
        th:insert="~{components/theme-auto-blue/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'auto'
                 or theme_light == 'auto'
                 or theme_auto == 'auto'
                 or color_schema == 'auto'}"
        th:insert="~{components/theme-auto/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'dark-blue'
                 or theme_light == 'dark-blue'
                 or theme_auto == 'dark-blue'
                 or color_schema == 'dark-blue'}"
        th:insert="~{components/theme-dark-blue/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'dark'
                 or theme_light == 'dark'
                 or theme_auto == 'dark'
                 or color_schema == 'dark'}"
        th:insert="~{components/theme-dark/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'gray'
                 or theme_light == 'gray'
                 or theme_auto == 'gray'
                 or color_schema == 'gray'}"
        th:insert="~{components/theme-gray/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'light-blue'
                 or theme_light == 'light-blue'
                 or theme_auto == 'light-blue'
                 or color_schema == 'light-blue'}"
        th:insert="~{components/theme-light-blue/template :: head}"
      ></th:block>
      <th:block
        th:if="${theme_dark == 'light'
                 or theme_light == 'light'
                 or theme_auto == 'light'
                 or color_schema == 'light'}"
        th:insert="~{components/theme-light/template :: head}"
      ></th:block>
    </th:block>
    <!--/* Preset Themes' Color CSS Variables Declarations end */-->
    <!--/* Preset Text Size CSS Variables Declarations start */-->
    <th:block
      th:if="${theme.config?.styles?.text_size == 'small'}"
      th:insert="~{components/text-size-small/template :: head}"
    ></th:block>
    <th:block
      th:if="${theme.config?.styles?.text_size == 'normal'}"
      th:insert="~{components/text-size-normal/template :: head}"
    ></th:block>
    <th:block
      th:if="${theme.config?.styles?.text_size == 'large'}"
      th:insert="~{components/text-size-large/template :: head}"
    ></th:block>
    <!--/* Preset Text Size CSS VariablesDeclarations end */-->
    <!--/* Inline Code Style start */-->
    <th:block th:insert="~{components/inline-code-style/template :: head}"></th:block>
    <!--/* Inline Code Style end */-->
    <!--/* Dark Content Text Style start */-->
    <th:block th:insert="~{components/dark-content-text-style/template :: head}"></th:block>
    <!--/* Dark Content Text Style end */-->
    <!--/* Anti-Mirror Site Script Start */-->
    <script
      th:if="${theme.config?.global?.anti_mirror_site}"
      th:data-target-url="${theme.config?.global?.target_url}"
      th:data-domain-whitelist="${#lists.isEmpty(theme.config?.global?.allow_site_whitelist)
                                  ? null
                                  : #strings.listJoin(theme.config?.global?.allow_site_whitelist.![input_domain], ' ')}"
      th:data-keep-path-and-query="${theme.config?.global?.is_keep_path_and_query}"
    >
      (function (dataset) {
        // <!--/* 获取被编码后的目标链接 */-->
        const encodedRedirectUrl = dataset?.targetUrl?.trim();
        if (!encodedRedirectUrl) {
          return;
        }

        // <!--/* 获取域名白名单 */-->
        const rawDomainWhiteList = dataset?.domainWhitelist?.trim();
        if (!rawDomainWhiteList) {
          return;
        }
        const domainWhiteList = rawDomainWhiteList.split(" ").map((item) => atob(item));

        // <!--/* 检查是否保留路径和查询参数，并且生成跳转后的目标链接 */-->
        const isKeepPathAndQuery = dataset?.keepPathAndQuery === "true";
        const targetRedirectUrl = isKeepPathAndQuery
          ? atob(encodedRedirectUrl) + window.location.pathname + window.location.search
          : atob(encodedRedirectUrl);

        // <!--/* 如果当前域名不在域名白名单中就跳转 */-->
        if (!domainWhiteList.includes(document.location.hostname)) {
          window.location.href = targetRedirectUrl;
        }
      })(document.currentScript?.dataset);
    </script>
    <!--/* Anti-Mirror Site Script End */-->
    <!--/* Language Cookie Sync and Browser Language Redirect Script Start */-->
    <script
      th:with="page_language_override=${language},
               requested_language_param=${'' + param.language},
               is_sync_language_cookie_to_content_language=${theme.config?.global?.is_sync_language_cookie_to_content_language != false},
               is_auto_redirect_to_browser_language=${theme.config?.global?.is_auto_redirect_to_browser_language},
               default_page_language=${theme.config?.global?.default_page_language},
               auto_redirect_target_languages=${#lists.isEmpty(theme.config?.global?.auto_redirect_target_language_list)
                                                ? null
                                                : #strings.listJoin(theme.config?.global?.auto_redirect_target_language_list.![v], ',')},
               is_prefix_match_mode=${theme.config?.global?.is_i18n_prefix_match_mode}"
      th:data-page-language-override="${page_language_override}"
      th:data-requested-language-param="${requested_language_param}"
      th:data-sync-language-cookie-to-content-language="${is_sync_language_cookie_to_content_language}"
      th:data-auto-redirect-to-browser-language="${is_auto_redirect_to_browser_language}"
      th:data-default-page-language="${default_page_language}"
      th:data-auto-redirect-target-languages="${auto_redirect_target_languages}"
      th:data-prefix-match-mode="${is_prefix_match_mode}"
    >
      (function (dataset) {
        // <!--/* 设计思路：
        // 1. 如果浏览器已有 language 查询参数，也就是在用户层面强行指定了页面语言，则不跳转
        // 2. 如果 ${language} 已经传入（重命名为 ${page_language_override}），也就是已经在元数据强行指定了页面语言，则同步语言 cookie 后不跳转
        // 3. 如果未启用浏览器按语言自动跳转，则同步语言 cookie 后不跳转
        // 4. 获取主题配置项中的目标语言列表，以及前缀匹配模式开关
        // 5. 获取浏览器语言，生成语言候选列表并匹配目标语言列表
        // 6. 获取主题配置项默认语言
        // 7. 如果默认语言未匹配浏览器语言，则跳转到带有浏览器语言参数的当前页面
        // */-->

        // <!--/* 核心理念（优先级）是：
        // 1. 用户浏览器查询参数的强制指定
        // 2. 站长在页面元数据的强制指定
        // 3. 根据浏览器语言识别自动跳转（用户浏览器语言刚好在站长配置的允许跳转列表里，那就跳）。
        // */-->

        // <!--/* 读取 Halo CMS 使用的 language cookie 原始值。
        // 返回值保持 cookie 中的编码形态，调用方会用 encodeURIComponent(language) 后的值来比较。 */-->
        function getLanguageCookie() {
          return document.cookie.match(/(?:^|;\s*)language=([^;]*)/)?.[1];
        }

        // <!--/* 将 language cookie 同步到当前页面实际内容语言，并在同步成功后刷新一次页面。
        // 这是为了解决无 language 查询参数访问页面时，cookie 仍停留在上一次语言导致主题固定文字与内容语言不一致的问题。
        // 如果站长关闭“是否根据页面内容语言同步 Cookie 语言”，或没有可同步的语言值，则直接返回。 */-->
        function syncLanguageCookieAndReload(language) {
          if (dataset?.syncLanguageCookieToContentLanguage !== "true") {
            return;
          }

          if (!language) {
            return;
          }

          const nextLanguageCookie = encodeURIComponent(language);
          if (getLanguageCookie() === nextLanguageCookie) {
            return;
          }

          // <!--/* 设置 language cookie 规则与 Halo CMS 一致 */-->
          document.cookie = `language=${nextLanguageCookie}; path=/; SameSite=Lax${location.protocol === "https:" ? "; Secure" : ""}`;
          // <!--/* 确保设置成功才刷新页面，避免无限刷新 */-->
          if (getLanguageCookie() === nextLanguageCookie) {
            window.location.reload();
          }
        }

        // <!--/* 如果浏览器已有 language 查询参数，则不跳转
        // param.language 是一个列表，例 []、['zh']、['zh,en']
        // language=zh -> ''+param.language 为 'zh'
        // language=zh,en -> ''+param.language 为 'zh,en'
        // 用 (new URL(window.location.href)).searchParams.get("language") 也差不多
        // 但我选择尽量预渲染，所以 ${'' + param.language}
        //
        // 因为用 language 参数，Halo CMS 检测到不一致会自动修改 cookie，
        // 自动返回指定语言内容，所以无需手动修改/刷新页面 */-->
        const requestedLanguageParam = dataset?.requestedLanguageParam;
        if (requestedLanguageParam) {
          return;
        }

        // <!--/* 后面是无 language 参数的时执行 */-->

        // <!--/* 如果 ${language} 已经传入，也就是已经指定了页面语言，则同步语言 cookie 后不跳转
        // 这个 ${language} 是文章元数据/分类详情页元数据/标签详情页元数据的 language */-->
        const pageLanguageOverride = dataset?.pageLanguageOverride;
        if (pageLanguageOverride) {
          // <!--/* 同步语言 cookie */-->
          syncLanguageCookieAndReload(pageLanguageOverride);
          return;
        }

        if (dataset?.autoRedirectToBrowserLanguage !== "true") {
          // <!--/* 这里不跳转，但需要同步一次语言 cookie
          // 例：我先访问了 example.com?language=en 的页面，设置了 cookie 为 en，
          //     然后访问 example.com 时，需要将 cookie 恢复为页面的 lang=zh-CN
          //     否则页面会大部分内容中文，小部分内容受 cookie 影响显示为 en */-->
          syncLanguageCookieAndReload(document.documentElement.lang);
          return;
        }

        // <!--/* 后面是启用了自动重定向时执行 */-->

        const autoRedirectTargetLanguages = dataset?.autoRedirectTargetLanguages
          ?.split(",")
          .map((language) => language.trim().replaceAll("_", "-"))
          .filter(Boolean);
        if (!autoRedirectTargetLanguages?.length) {
          // <!--/* 这里不跳转，但需要同步一次语言 cookie */-->
          syncLanguageCookieAndReload(document.documentElement.lang);
          return;
        }

        const prefixMode = dataset?.prefixMatchMode === "true";
        
        // <!--/* 去掉候选语言列表里的空值和重复项，同时保留原始顺序。
        // 中文候选路径里可能会出现重复项，例如 zh-CN 会生成 zh-hans-cn、zh-hans、zh-cn、zh，
        // 而 zh-Hans-CN 会生成 zh-hans-cn、zh-hans、zh；保序去重可以让匹配优先级稳定。 */-->
        function uniqueLanguages(languages) {
          return languages.filter((language, index) => language && languages.indexOf(language) === index);
        }

        // <!--/* 根据浏览器语言或配置语言生成从具体到通用的匹配候选列表。
        // 返回值会统一转换为小写，并将下划线改为短横线，便于后续只做一次标准化后的比较。
        //
        // 非中文语言不做额外推导，只返回标准化后的语言标签。
        // 中文语言会特化常见区域：
        // - zh-cn / zh-sg / zh-my -> zh-hans-{region} -> zh-hans -> 原始语言标签 -> zh
        // - zh-tw / zh-hk / zh-mo -> zh-hant-{region} -> zh-hant -> 原始语言标签 -> zh
        // - zh-hans-* -> 原始语言标签 -> zh-hans -> zh
        // - zh-hant-* -> 原始语言标签 -> zh-hant -> zh
        // - zh -> zh-hans -> zh
        // 这样站长通常只配置 zh-hans 和 zh-hant，也可以匹配常见中文区域语言标签。 */-->
        function getLanguageMatchCandidates(language) {
          const normalizedLanguage = language?.trim().replaceAll("_", "-").toLowerCase();
          if (!normalizedLanguage) {
            return [];
          }

          const languageParts = normalizedLanguage.split("-");
          if (languageParts[0] !== "zh") {
            return [normalizedLanguage];
          }

          const chineseLocale = languageParts[1];
          if (!chineseLocale) {
            // <!--/* 未指定区域或脚本时，默认按简体中文候选处理。 */-->
            return ["zh-hans", "zh"];
          }
          if (chineseLocale === "hans") {
            // <!--/* 已经显式指定简体脚本，保留原始标签后回退到通用简体与 zh。 */-->
            return uniqueLanguages([normalizedLanguage, "zh-hans", "zh"]);
          }
          if (chineseLocale === "hant") {
            // <!--/* 已经显式指定繁体脚本，保留原始标签后回退到通用繁体与 zh。 */-->
            return uniqueLanguages([normalizedLanguage, "zh-hant", "zh"]);
          }
          if (["cn", "sg", "my"].includes(chineseLocale)) {
            // <!--/* 简体中文常见区域，优先尝试脚本 + 区域，再回退到脚本、原始区域标签和 zh。 */-->
            return uniqueLanguages([`zh-hans-${chineseLocale}`, "zh-hans", normalizedLanguage, "zh"]);
          }
          if (["tw", "hk", "mo"].includes(chineseLocale)) {
            // <!--/* 繁体中文常见区域，优先尝试脚本 + 区域，再回退到脚本、原始区域标签和 zh。 */-->
            return uniqueLanguages([`zh-hant-${chineseLocale}`, "zh-hant", normalizedLanguage, "zh"]);
          }

          return uniqueLanguages([normalizedLanguage, "zh"]);
        }

        // <!--/* 获取浏览器语言候选列表 */-->
        const browserLanguageCandidates = getLanguageMatchCandidates(navigator.language);

        let matchedLang;
        if (prefixMode) {
          // <!--/* 前缀模式保持配置列表优先级。
          // 例：配置列表为 zh、en，浏览器候选为 zh-hans、zh 时，会命中 zh。
          // 这样站长可以用更通用的语言代码覆盖一组区域或脚本语言。 */-->
          matchedLang = autoRedirectTargetLanguages.find((targetLanguage) =>
            browserLanguageCandidates.some((candidate) => candidate.startsWith(targetLanguage.toLowerCase())),
          );
        } else {
          // <!--/* 精确模式保持浏览器候选优先级。
          // 例：navigator.language 为 zh-cn 时，候选顺序是 zh-hans-cn、zh-hans、zh-cn、zh。
          // 如果配置列表同时存在 zh-hans 和 zh-cn，会先命中 zh-hans，
          // 因为它是当前候选规则里更推荐的脚本语言标签。 */-->
          for (const candidate of browserLanguageCandidates) {
            matchedLang = autoRedirectTargetLanguages.find(
              (targetLanguage) => targetLanguage.toLowerCase() === candidate,
            );
            if (matchedLang) {
              break;
            }
          }
        }
        // <!--/* 没有匹配的语言参数，不进行跳转 */-->
        if (!matchedLang) {
          // <!--/* 这里不跳转，但需要同步一次语言 cookie */-->
          syncLanguageCookieAndReload(document.documentElement.lang);
          return;
        }

        // <!--/* 不能直接用 getLanguageMatchCandidates() 做等价比较，因为候选列表里有通用回退 zh。
        // 如果直接比较，zh-Hans -> zh 和 zh-Hant -> zh 会导致简体和繁体因 zh 被误判成等价。
        // 所以这里会去掉用于等价比较的通用 zh，避免 zh-Hans == zh-Hant。 */-->
        function getLanguageEquivalenceCandidates(language) {
          const candidates = getLanguageMatchCandidates(language);
          return candidates.length > 1 ? candidates.filter((candidate) => candidate !== "zh") : candidates;
        }

        // <!--/* 获取配置项默认语言 */-->
        const defaultPageLanguageCandidates = getLanguageEquivalenceCandidates(dataset?.defaultPageLanguage || "zh-CN");

        // <!--/* 准备跳转到带有浏览器语言参数的当前页面
        // 如果默认语言已匹配 matchedLang 的候选语言，说明无 language 参数页面的语言（html 的 lang）就是目标语言，无需跳转 */-->
        if (
          getLanguageEquivalenceCandidates(matchedLang).some((candidate) =>
            defaultPageLanguageCandidates.some((defaultCandidate) =>
              prefixMode ? defaultCandidate.startsWith(candidate) : defaultCandidate === candidate,
            ),
          )
        ) {
          // <!--/* 这里不跳转，但需要同步一次语言 cookie */-->
          syncLanguageCookieAndReload(document.documentElement.lang);
          return;
        }

        // <!--/* 进行跳转 */-->
        const url = new URL(window.location);
        url.searchParams.set("language", matchedLang);
        window.location.href = url;
      })(document.currentScript?.dataset);
    </script>
    <!--/* Language Cookie Sync and Browser Language Redirect Script End */-->

    <script type="module">
      (function () {
        const relList = document.createElement("link").relList;
        if (relList && relList.supports && relList.supports("modulepreload")) {
          return;
        }

        for (const link of document.querySelectorAll('link[rel="modulepreload"]')) {
          processPreload(link);
        }

        new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            if (mutation.type !== "childList") {
              continue;
            }
            for (const node of mutation.addedNodes) {
              if (node.tagName === "LINK" && node.rel === "modulepreload") processPreload(node);
            }
          }
        }).observe(document, { childList: true, subtree: true });

        function getFetchOpts(link) {
          const fetchOpts = {};
          if (link.integrity) fetchOpts.integrity = link.integrity;
          if (link.referrerPolicy) fetchOpts.referrerPolicy = link.referrerPolicy;
          if (link.crossOrigin === "use-credentials") fetchOpts.credentials = "include";
          else if (link.crossOrigin === "anonymous") fetchOpts.credentials = "omit";
          else fetchOpts.credentials = "same-origin";
          return fetchOpts;
        }

        function processPreload(link) {
          if (link.ep)
            // ep marker = processed
            return;
          link.ep = true;
          const fetchOpts = getFetchOpts(link);
          fetch(link.href, fetchOpts);
        }
      })();

    <script type="module">
      function updateThemeColor() {
        const color = getComputedStyle(document.documentElement).getPropertyValue("--color-base-100");
        const themeColorMetaTag = document.querySelector('meta[name="theme-color"]');
        if (color && themeColorMetaTag) {
          themeColorMetaTag.setAttribute("content", color);
        }
      }

      // <!--/* Initialization */-->
      updateThemeColor();

      // <!--/* Observe changes to the 'theme' attribute on the html element */-->
      const observer = new MutationObserver(updateThemeColor);
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["theme"],
      });
    </script>

        const targetElementList = document.querySelectorAll(".matched-menu");

        if (targetElementList.length === 0) {
          // <!--/* 找到所有 class="default-menu" 的元素 */-->
          const defaultMenus = document.querySelectorAll(".default-menu");

          // <!--/* 遍历这些元素，移除 style="display: none;" */-->
          defaultMenus.forEach((menu) => {

              menu.style.display = ""; // <!--/* 清空 display 样式 */-->
            }
          });
        } else {
          // <!--/* targetElementList.length !== 0 的情况下，移除所有 class="default-menu" 的元素 */-->

          defaultMenus.forEach((menu) => {
