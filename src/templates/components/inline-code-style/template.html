<!--/*-->
<head th:remove="tag"></head>
<!--*/-->
<body th:remove="tag">
  <!--/*/
  <style
    th:inline="css"
    th:with="inlineCodeStyle = ${theme.config?.post_styles?.inline_code_style_preset}"
    th:if="${!#strings.equals(inlineCodeStyle, 'default')}"
  >
    article .content :not(pre) > code {
      /*[# th:if="${#strings.equals(inlineCodeStyle, 'soft-fill')}"]*/
      background-color: color-mix(in oklab, var(--color-base-content) 8%, var(--color-base-200));
      border: none;
      border-radius: 0.375rem;
      box-decoration-break: clone;
      color: inherit;
      padding-block: 0.15em;
      padding-inline: 0.4em;
      /*[/]*/
      /*[# th:if="${#strings.equals(inlineCodeStyle, 'pill')}"]*/
      background-color: color-mix(in oklab, var(--color-primary) 12%, var(--color-base-200));
      border: none;
      border-radius: 999px;
      box-decoration-break: clone;
      color: color-mix(in oklab, var(--color-primary) 45%, var(--color-base-content));
      padding-block: 0.18em;
      padding-inline: 0.55em;
      /*[/]*/
    }
  </style>
  /*/-->
</body>
