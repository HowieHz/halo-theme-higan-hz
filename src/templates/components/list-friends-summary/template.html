<head th:remove="tag">
  <script
    src="index.ts"
    type="module"
  ></script>
  <!--/* 翻页组件应始终加载；即使页码超出范围，组件也仍需存在 */-->
  <th:block th:insert="~{components/pagination/template :: head}"></th:block>
</head>
<body
  th:remove="tag"
  th:fragment="body(friends, pageTemplateName)"
>
  <section class="friends-list-summary tw:flex tw:flex-auto tw:flex-col">
    <div class="tw:flex tw:flex-auto tw:flex-col tw:space-y-10">
      <th:block
        th:each="friend : ${friends.items}"
        th:with="spec = ${friend.spec}"
      >
        <div class="tw:grid tw:grid-cols-1 tw:md:grid-cols-4 tw:md:items-baseline">
          <div class="group tw:relative tw:flex tw:flex-col tw:md:col-span-3">
            <h2 class="color-text tw:static tw:m-0 tw:text-base tw:font-semibold tw:tracking-tight">
              <div
                class="friend-card-hover tw:absolute tw:-inset-x-4 tw:-inset-y-2 tw:z-0 tw:opacity-0 tw:sm:-inset-x-6 tw:sm:rounded-2xl"
              ></div>
              <a
                th:href="@{${spec.postLink}}"
                target="_blank"
                rel="noopener"
              >
                <span class="tw:absolute tw:-inset-x-4 tw:-inset-y-2 tw:z-20 tw:sm:-inset-x-6 tw:sm:rounded-2xl"></span>
                <span
                  class="tw:relative tw:z-10"
                  th:text="${spec.title}"
                  >文章标题替换位</span
                >
              </a>
            </h2>
            <time
              th:if="${!(#strings.equals(pageTemplateName, 'index')
                         or #strings.equals(pageTemplateName, 'friends'))
                       or (#strings.equals(pageTemplateName, 'index')
                           and theme.config?.index_styles?.is_show_friend_pubdate)
                       or (#strings.equals(pageTemplateName, 'friends')
                           and theme.config?.friends_page_styles?.is_show_friend_pubdate)}"
              class="color-base-content-80 tw:relative tw:z-10 tw:order-first tw:mb-3 tw:flex tw:items-center tw:pl-3.5 tw:text-sm tw:md:hidden"
              th:datetime="${#temporals.format(spec.pubDate, 'yyyy-MM-dd')}"
            >
              <span
                class="tw:absolute tw:inset-y-0 tw:left-0 tw:flex tw:items-center"
                aria-hidden="true"
              >
                <span class="tw:h-4 tw:w-0.5 tw:rounded-full tw:bg-zinc-200 tw:dark:bg-zinc-500"></span>
              </span>
              <th:block th:text="${#temporals.format(spec.pubDate, 'MMMM dd yyyy')}"></th:block>
            </time>
            <div
              th:if="${!(#strings.equals(pageTemplateName, 'index')
                         or #strings.equals(pageTemplateName, 'friends'))
                       or (#strings.equals(pageTemplateName, 'index')
                           and theme.config?.index_styles?.is_show_friend_author)
                       or (#strings.equals(pageTemplateName, 'friends')
                           and theme.config?.friends_page_styles?.is_show_friend_author)}"
              class="friend-author color-time tw:relative tw:z-20 tw:mt-0.5 tw:mb-0 tw:flex tw:items-center tw:text-sm"
            >
              <a
                th:if="${!(#strings.equals(pageTemplateName, 'index')
                           or #strings.equals(pageTemplateName, 'friends'))
                         or (#strings.equals(pageTemplateName, 'index')
                             and theme.config?.index_styles?.is_show_friend_author_avatar)
                         or (#strings.equals(pageTemplateName, 'friends')
                             and theme.config?.friends_page_styles?.is_show_friend_author_avatar)}"
                th:href="@{${spec.authorUrl}}"
                target="_blank"
                rel="noopener"
                class="tw:mr-2"
              >
                <img
                  th:src="${spec.logo}"
                  th:alt="${spec.author}"
                  class="friend-author-avatar tw:h-6 tw:w-6 tw:rounded-full"
                  loading="lazy"
                />
              </a>
              <a
                th:if="${!(#strings.equals(pageTemplateName, 'index')
                           or #strings.equals(pageTemplateName, 'friends'))
                         or (#strings.equals(pageTemplateName, 'index')
                             and theme.config?.index_styles?.is_show_friend_author_name)
                         or (#strings.equals(pageTemplateName, 'friends')
                             and theme.config?.friends_page_styles?.is_show_friend_author_name)}"
                th:href="@{${spec.authorUrl}}"
                target="_blank"
                rel="noopener"
                class="friend-author-link"
              >
                <span th:text="${spec.author}">作者名称替换位</span>
              </a>
            </div>
            <th:block
              th:if="${!(#strings.equals(pageTemplateName, 'index')
                         or #strings.equals(pageTemplateName, 'friends'))
                       or (#strings.equals(pageTemplateName, 'index')
                           and theme.config?.index_styles?.is_show_friend_description)
                       or (#strings.equals(pageTemplateName, 'friends')
                           and theme.config?.friends_page_styles?.is_show_friend_description)}"
              th:with="max_lines = ${#strings.equals(pageTemplateName, 'index')
                                     ? theme.config?.index_styles?.friend_description_max_lines
                                     : (#strings.equals(pageTemplateName, 'friends')
                                        ? theme.config?.friends_page_styles?.friend_description_max_lines
                                        : '3')}"
            >
              <p
                class="color-base-content-80 tw:relative tw:z-10 tw:mt-2 tw:mb-0 tw:p-0 tw:text-sm"
                th:text="${spec.description}"
                th:classappend="|${max_lines == '1' ? 'tw:line-clamp-1' : ''} ${max_lines == '2' ? 'tw:line-clamp-2' : ''} ${max_lines == '3' ? 'tw:line-clamp-3' : ''} ${max_lines == '4' ? 'tw:line-clamp-4' : ''} ${max_lines == '5' ? 'tw:line-clamp-5' : ''}|"
              >
                文章描述替换位
              </p>
            </th:block>
            <div
              th:if="${!(#strings.equals(pageTemplateName, 'index')
                         or #strings.equals(pageTemplateName, 'friends'))
                       or (#strings.equals(pageTemplateName, 'index')
                           and theme.config?.index_styles?.is_show_friend_permalink_text)
                       or (#strings.equals(pageTemplateName, 'friends')
                           and theme.config?.friends_page_styles?.is_show_friend_permalink_text)}"
              aria-hidden="true"
              class="color-primary tw:relative tw:z-10 tw:mt-4 tw:flex tw:items-center tw:text-sm tw:font-medium"
              th:text="#{page.friends.postListPermalinkText}"
            >
              阅读全文
            </div>
          </div>
          <time
            th:if="${!(#strings.equals(pageTemplateName, 'index')
                       or #strings.equals(pageTemplateName, 'friends'))
                     or (#strings.equals(pageTemplateName, 'index')
                         and theme.config?.index_styles?.is_show_friend_pubdate)
                     or (#strings.equals(pageTemplateName, 'friends')
                         and theme.config?.friends_page_styles?.is_show_friend_pubdate)}"
            class="color-base-content-80 tw:relative tw:z-10 tw:order-first tw:mt-1 tw:mb-3 tw:hidden tw:items-center tw:text-sm tw:md:flex"
            th:datetime="${#temporals.format(spec.pubDate, 'yyyy-MM-dd')}"
            th:text="${#temporals.format(spec.pubDate, 'MMMM dd yyyy')}"
          >
          </time>
        </div>
      </th:block>
    </div>
    <th:block
      th:if="${#strings.equals(pageTemplateName, 'index')}"
      th:insert="~{components/pagination/template :: body(posts = ${friends}, isListResult = true)}"
    ></th:block>
    <th:block
      th:if="${#strings.equals(pageTemplateName, 'friends')}"
      th:insert="~{components/pagination/template :: body(posts = ${friends})}"
    ></th:block>
  </section>
</body>
