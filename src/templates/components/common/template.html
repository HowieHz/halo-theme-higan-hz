<head></head>
<body></body>
<!--*/-->
<th:block
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="menu(showIcon)"
>
  <ul>
    <li class="icon" th:if="${showIcon}">
      <a
        href="#"
        onclick="event.preventDefault()"
        aria-expanded="false"
        role="button"
        th:aria-label="#{fragment.menu.toggle-button.aria-label}"
      >
        <span class="iconify-huge iconify material-symbols--menu"></span>
      </a>
    </li>

    <!--/* 后台设置的菜单项 */-->
    <th:block th:insert="~{:: base-menu}"></th:block>

    <th:block th:each="item : ${theme.config?.styles?.extra_menu_items}">
      <!--/* random post button */-->
      <th:block th:if="${item?.type == 'random'}">
        <th:block th:with="allPostList = ${postFinder.listAll()}">
          <li th:unless="${#lists.isEmpty(allPostList)}">
            <a
              href="/"
              th:with="randomIndex = ${T(java.lang.Math).floor(T(java.lang.Math).random() * #lists.size(allPostList))},
                       postPermalink = ${allPostList[randomIndex].status.permalink}"
              th:href="${postPermalink}"
              th:aria-label="#{fragment.menu.random-button.aria-label}"
              th:text="#{fragment.menu.random}"
            ></a>
          </li>
        </th:block>
      </th:block>
      <!--/* login status button */-->
      <li th:if="${item?.type == 'user'}">
        <a
          sec:authorize="isAnonymous()"
          href="/login"
          onclick="this.href = '/login?redirect_uri=' + encodeURIComponent(window.location.href)"
          th:text="#{fragment.menu.login}"
        >
        </a>
        <a
          sec:authorize="isAuthenticated()"
          th:with="loggedInUser = ${contributorFinder.getContributor(#authentication.name)}"
          th:text="${loggedInUser.displayName}"
          href="/uc"
        >
        </a>
      </li>
      <!--/* search widget button */-->
      <li
        th:if="${item?.type == 'search'
                 and pluginFinder.available('PluginSearchWidget')}"
      >
        <a
          href="javascript:SearchWidget.open();"
          th:aria-label="#{fragment.menu.search-button.aria-label}"
          th:text="#{fragment.menu.search}"
        ></a>
      </li>
    </th:block>
  </ul>
</th:block>

<th:block th:fragment="base-menu" th:with="menuItems = ${menuFinder.getPrimary().menuItems}">
  <!--/* 普通菜单 start */-->
  <th:block th:unless="${theme.config?.global?.is_i18n_menu_show}">
    <th:block th:each="menuItem : ${menuItems}">
      <th:block th:insert="~{:: menu-item(${menuItem})}"></th:block>
    </th:block>
  </th:block>
  <!--/* 普通菜单 end */-->
  <!--/* 多语言菜单 start */-->
  <!--/* 多语言全等匹配模式 start */-->
  <th:block
    th:if="${theme.config?.global?.is_i18n_menu_show
             and !theme.config?.global?.is_i18n_prefix_match_mode}"
  >
    <th:block th:each="menuItem : ${menuItems}">
      <th:block th:if="${#strings.equals(menuItem.status.displayName, page_language)}">
        <th:block th:each="menuItemChildren : ${menuItem?.children}">
          <th:block th:insert="~{:: menu-item(${menuItemChildren})}"></th:block>
        </th:block>
      </th:block>
    </th:block>
  </th:block>
  <!--/* 多语言全等匹配模式 end */-->
  <!--/* 多语言前缀匹配模式 start */-->
  <th:block
    th:if="${theme.config?.global?.is_i18n_menu_show
             and theme.config?.global?.is_i18n_prefix_match_mode}"
  >
    <th:block th:each="menuItem : ${menuItems}">
      <th:block
        th:if="${page_language != null
                 and menuItem.status.displayName != null
                 and #strings.startsWith(page_language, menuItem.status.displayName)}"
      >
        <th:block th:each="menuItemChildren : ${menuItem?.children}">
          <th:block th:insert="~{:: menu-item(${menuItemChildren})}"></th:block>
        </th:block>
      </th:block>
    </th:block>
  </th:block>
  <!--/* 多语言前缀匹配模式 end */-->
  <!--/* 隐藏的默认语言菜单项，在未成功匹配时显示 start */-->
  <th:block th:if="${theme.config?.global?.is_i18n_menu_show}">
    <th:block th:each="menuItem : ${menuItems}">
      <th:block th:if="${#strings.equals(menuItem.status.displayName, theme.config?.global?.default_page_language)}">
        <th:block th:each="menuItemChildren : ${menuItem.children}">
          <li
            style="display: none"
            class="default-menu"
            th:classappend="${#lists.isEmpty(menuItemChildren?.children) ? '' : 'has-submenu'}"
          >
            <th:block th:replace="~{:: menu-item-content(${menuItemChildren})}"></th:block>
          </li>
        </th:block>
      </th:block>
    </th:block>
  </th:block>
  <!--/* 隐藏的默认语言菜单项 end */-->
  <!--/* 多语言菜单 end */-->
</th:block>

<th:block th:fragment="menu-item(item)">
  <li class="matched-menu" th:classappend="${#lists.isEmpty(item?.children) ? '' : 'has-submenu'}">
    <th:block th:replace="~{:: menu-item-content(${item})}"></th:block>
  </li>
</th:block>

<th:block th:fragment="menu-item-content(item)">
  <th:block th:if="${#lists.isEmpty(item?.children)}">
    <!--/* 没有子菜单的菜单项 */-->
    <a
      th:href="@{${item?.status?.href}}"
      th:target="${item?.spec?.target?.value}"
      th:aria-label="#{fragment.menu.menuItem.aria-label(${item.status?.displayName})}"
      th:text="${item?.status?.displayName}"
      >目录项填充位置</a
    >
  </th:block>
  <th:block th:unless="${#lists.isEmpty(item?.children)}">
    <!--/* 有子菜单的菜单项 */-->
    <span class="submenu-container">
      <button
        class="submenu-toggle v-cursor-pointer m-0 border-none bg-transparent p-0 focus:outline-none"
        th:aria-label="#{fragment.menu.submenu-toggle.aria-label}"
        type="button"
      >
        <span class="iconify-large-middle mr-1 iconify material-symbols--keyboard-arrow-down"></span></button
      ><a
        class="submenu-link"
        th:href="@{${item?.status?.href}}"
        th:target="${item?.spec?.target?.value}"
        th:aria-label="#{fragment.menu.menuItem.aria-label(${item.status?.displayName})}"
        th:text="${item?.status?.displayName}"
        th:attr="data-parent-href=${item?.status?.href},
                data-parent-target=${item?.spec?.target?.value},
                data-parent-label=${item?.status?.displayName},
                data-submenu-hrefs=${#strings.arrayJoin(item.children.![status.href].toArray(), '|||')},
                data-submenu-targets=${#strings.arrayJoin(item.children.![spec.target.value].toArray(), '|||')},
                data-submenu-labels=${#strings.arrayJoin(item.children.![status.displayName].toArray(), '|||')},
                data-submenu-index='0',
                data-submenu-count=${#lists.size(item.children) + 1}"
        >菜单项填充位置</a
      >
    </span>
  </th:block>
</th:block>

<th:block th:fragment="share(originPermalink, title)">
  <th:block
    th:with="permalink = ${siteUrl} + ${originPermalink},
             title = ${title}"
  >
    <ul>
      <script th:inline="javascript">
        function nativeShare(link) {
          const postTitle = /*[[${title}]]*/ "";
          const shareData = { title: postTitle, url: link };
          if (navigator.canShare?.(shareData)) {
            navigator.share(shareData);
          } else {
            console.error("Sharing not supported");
          }
        }
      </script>
      <th:block th:each="item : ${theme.config?.share?.share_list}">
        <!--/* Preset: Native */-->
        <li th:if="${item?.type == 'native'}">
          <a
            class="icon"
            th:aria-label="#{common.shareModal.share.aria-label('Native')}"
            th:href="|javascript:nativeShare('${permalink}');|"
          >
            <span
              class="iconify"
              th:style="|--svg:url('${item?.icon.value}')|"
              th:if="${item?.icon != null and item?.icon != ''}"
            ></span>
            <span class="iconify mdi--share-circle" th:if="${item?.icon == null or item?.icon == ''}"></span>
          </a>
        </li>
        <!--/* Preset: non-Native */-->
        <li
          th:if="${item?.type != 'native' and item?.type != 'custom_share'}"
          th:with="typeLabel = ${
            item?.type == 'email' ? 'E-mail' :
            item?.type == 'qrcode' ? 'QR Code' :
            item?.type == 'facebook' ? 'Facebook' :
            item?.type == 'reddit' ? 'Reddit' :
            item?.type == 'x' ? 'X' :
            item?.type == 'linkedin' ? 'LinkedIn' :
            item?.type == 'pinterest' ? 'Pinterest' :
            item?.type == 'telegram' ? 'Telegram' :
            item?.type == 'whatsapp' ? 'WhatsApp' :
            item?.type == 'tumblr' ? 'Tumblr' :
            item?.type == 'blogger' ? 'Blogger' :
            item?.type == 'gmail' ? 'Gmail' :
            item?.type == 'yahoomail' ? 'Yahoo Mail' :
            item?.type == 'skype' ? 'Skype' :
            item?.type == 'line' ? 'LINE' :
            item?.type == 'hackernews' ? 'Hacker News' :
            item?.type == 'qq' ? 'QQ' :
            item?.type == 'weibo' ? 'Weibo' :
            item?.type == 'wechat' ? 'WeChat' :
            item?.type == 'qzone' ? 'Qzone' :
            item?.type == 'douban' ? 'Douban' :
            item?.type},
          shareUrl = ${
            item?.type == 'email' ? 'mailto:?subject=@TITLE&body=Check out this article: @URL' :
            item?.type == 'qrcode' ? '/themes/howiehz-higan/assets/qrcode.html?size=300&url=@URL' :
            item?.type == 'facebook' ? 'https://www.facebook.com/sharer.php?u=@URL' :
            item?.type == 'reddit' ? 'https://reddit.com/submit?url=@URL&title=@TITLE' :
            item?.type == 'x' ? 'https://twitter.com/intent/tweet?url=@URL&text=@TITLE' :
            item?.type == 'linkedin' ? 'https://www.linkedin.com/sharing/share-offsite/?url=@URL' :
            item?.type == 'pinterest' ? 'https://pinterest.com/pin/create/bookmarklet/?url=@URL&title=@TITLE' :
            item?.type == 'telegram' ? 'https://telegram.me/share/url?url=@URL&text=@TITLE' :
            item?.type == 'whatsapp' ? 'https://api.whatsapp.com/send?text=@TITLE%20@URL' :
            item?.type == 'tumblr' ? 'https://www.tumblr.com/widgets/share/tool?canonicalUrl=@URL&title=@TITLE' :
            item?.type == 'blogger' ? 'https://www.blogger.com/blog-this.g?u=@URL&n=@TITLE&t=Check out this article: @URL' :
            item?.type == 'gmail' ? 'https://mail.google.com/mail/?view=cm&su=@TITLE&body=Check out this article: @URL' :
            item?.type == 'yahoomail' ? 'https://compose.mail.yahoo.com/?subject=@TITLE&body=Check out this article: @URL' :
            item?.type == 'skype' ? 'https://web.skype.com/share?url=@URL&text=@TITLE' :
            item?.type == 'line' ? 'https://social-plugins.line.me/lineit/share?url=@URL' :
            item?.type == 'hackernews' ? 'https://news.ycombinator.com/submitlink?u=@URL&t=@TITLE' :
            item?.type == 'qq' ? 'https://connect.qq.com/widget/shareqq/iframe_index.html?url=@URL&title=@TITLE' :
            item?.type == 'weibo' ? 'https://service.weibo.com/share/share.php?url=@URL&title=@TITLE' :
            item?.type == 'wechat' ? '/themes/howiehz-higan/assets/qrcode.html?size=300&url=@URL' :
            item?.type == 'qzone' ? 'https://sns.qzone.qq.com/cgi-bin/qzshare/cgi_qzshare_onekey?url=@URL&title=@TITLE' :
            item?.type == 'douban' ? 'https://www.douban.com/share/service?href=@URL&name=@TITLE' :
            '@URL'}"
        >
          <a
            class="icon"
            th:aria-label="#{common.shareModal.share.aria-label(${typeLabel})}"
            th:href="${#strings.replace(#strings.replace(shareUrl, '@URL', permalink), '@TITLE', title)}"
          >
            <!--/* 自定义图标覆盖 */-->
            <span
              class="iconify"
              th:style="|--svg:url('${item?.icon.value}')|"
              th:if="${item?.icon != null and item?.icon != ''}"
            ></span>
            <!--/* 默认图标 */-->
            <span
              class="iconify icomoon-free--mail4"
              th:if="${item?.type == 'email' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify pepicons-pencil--qr-code-circle-filled"
              th:if="${item?.type == 'qrcode' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify ic--baseline-facebook"
              th:if="${item?.type == 'facebook' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify ant-design--reddit-circle-filled"
              th:if="${item?.type == 'reddit' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify mdi--twitter-circle"
              th:if="${item?.type == 'x' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify entypo-social--linkedin-with-circle"
              th:if="${item?.type == 'linkedin' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify mdi--pinterest"
              th:if="${item?.type == 'pinterest' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify uil--telegram"
              th:if="${item?.type == 'telegram' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify ri--whatsapp-fill"
              th:if="${item?.type == 'whatsapp' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify entypo-social--tumblr-with-circle"
              th:if="${item?.type == 'tumblr' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify simple-icons--blogger"
              th:if="${item?.type == 'blogger' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify simple-icons--gmail"
              th:if="${item?.type == 'gmail' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify simple-icons--yahoo"
              th:if="${item?.type == 'yahoomail' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify simple-icons--skype"
              th:if="${item?.type == 'skype' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify simple-icons--line"
              th:if="${item?.type == 'line' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify fa--hacker-news"
              th:if="${item?.type == 'hackernews' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify ant-design--qq-circle-filled"
              th:if="${item?.type == 'qq' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify ant-design--weibo-circle-filled"
              th:if="${item?.type == 'weibo' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify ant-design--wechat-filled"
              th:if="${item?.type == 'wechat' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify cib--qzone"
              th:if="${item?.type == 'qzone' and (item?.icon == null or item?.icon == '')}"
            ></span>
            <span
              class="iconify tabler--brand-douban"
              th:if="${item?.type == 'douban' and (item?.icon == null or item?.icon == '')}"
            ></span>
          </a>
        </li>
        <!--/* Custom */-->
        <th:block th:if="${item?.type == 'custom_share'}">
          <th:block
            th:each="custom_item : ${theme.config?.share?.custom_share}"
            th:if="${item?.custom_id == custom_item?.id}"
          >
            <li>
              <a
                class="icon"
                th:aria-label="#{common.shareModal.share.aria-label(${custom_item?.aria_label})}"
                th:href="${#strings.replace(#strings.replace(custom_item?.url, '@URL', permalink), '@TITLE', title)}"
              >
                <span class="iconify" th:style="|--svg:url('${custom_item?.icon.value}')|"></span>
              </a>
            </li>
          </th:block>
        </th:block>
      </th:block>
    </ul>
  </th:block>
</th:block>

<button
  th:fragment="theme-toggle-button"
  th:if="${theme.config?.styles?.is_show_color_scheme_toggle_button}"
  id="theme-toggle-button"
  accesskey="t"
  title="(Alt + T)"
  type="button"
  class="border-0 bg-transparent align-middle"
>
  <span
    id="theme-toggle-button-icon"
    style="display: none"
    class="icon iconify-large iconify -translate-x-px -translate-y-px"
  ></span>
  <style>
    #theme-toggle-button {
      & .icon:hover {
        color: var(--color-accent);
      }
    }
  </style>
</button>

<th:block
  th:fragment="auto-redirect"
  th:with="siteUrl = ${#strings.substring(site.url, #strings.length(site.url) - 1) == '/'
                       ? #strings.substring(site.url, 0, #strings.length(site.url) - 1)
                       : site.url}"
>
  <p id="countdown" style="opacity: 0%; transition: opacity 1s"></p>
  <script th:inline="javascript">
    const countdownElement = document.getElementById("countdown");
    const siteUrl = /*[[${siteUrl}]]*/ "";
    var targetUrl = /*[[${theme.config?.error_page_styles?.target_url}]]*/ "/";
    if (targetUrl.startsWith("/")) {
      targetUrl = siteUrl + targetUrl;
    }
    let currentTimeLeft = /*[(${theme.config?.error_page_styles?.redirect_wait_time})]*/ 5;
    const originText = /*[[#{page.error.auto-refresh}]]*/ "";
    document.addEventListener("DOMContentLoaded", () => {
      countdownElement.innerHTML = `${originText
        .replace("{0}", currentTimeLeft)
        .replace("{1}", `<a href="${targetUrl}">${targetUrl}</a>`)}`;
      countdownElement.style.opacity = 1; // <!--/* 此处动画耗时一秒 */-->
      currentTimeLeft -= 1;
      const countdownInterval = setInterval(() => {
        if (currentTimeLeft <= 0) {
          clearInterval(countdownInterval);
          window.location.href = targetUrl;
        }
        countdownElement.innerHTML = `${originText
          .replace("{0}", currentTimeLeft)
          .replace("{1}", `<a href="${targetUrl}">${targetUrl}</a>`)}`;
        currentTimeLeft -= 1;
      }, 1000);
    });
  </script>
</th:block>
