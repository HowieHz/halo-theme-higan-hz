<head
  th:remove="tag"
  th:fragment="head"
>
  <script
    src="index.ts"
    type="module"
  ></script>
</head>
<body
  th:remove="tag"
  th:fragment="body"
>
  <p
    id="quote"
    th:data-link="${theme.config?.index_styles?.quote_link}"
  ></p>
  <style>
    #quote:empty::before {
      content: "\00a0";
      visibility: hidden;
    }
  </style>
  <style th:if="${theme.config?.index_styles?.is_quote_fade_in_animation_enable}">
    #quote:not(:empty) {
      animation: quote-fade-in 0.45s ease-out;
    }

    @keyframes quote-fade-in {
      from {
        opacity: 0%;
        transform: translateY(0.25rem);
      }

      to {
        opacity: 100%;
        transform: translateY(0);
      }
    }
  </style>
</body>
