<!doctype html>
<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{components/base-layout/template :: html(
    title = |${title ?: #messages.msg('page.moments.page-title')} - ${site.title}|,
    head = ~{:: head},
    content = ~{:: body},
    header = ~{components/header/template :: body},
    navbar = ~{}
  )}"
>
  <head th:remove="tag">
    <link
      rel="canonical"
      th:if="${theme.config?.moments_styles?.is_enable_canonical_link}"
      th:href="${siteUrl} + @{/moments}"
    />
    <link
      th:if="${pluginFinder.available('PluginFeed')}"
      rel="alternate"
      type="application/rss+xml"
      title="Moments - All"
      th:href="@{'/moments/rss.xml'}"
    />
    <script src="/page-components/moments/index.ts" type="module"></script>
    <th:block th:insert="~{components/header/template :: head}"></th:block>
    <th:block th:insert="~{components/list-moment-summary/template :: head(pageTemplateName = 'moments')}"></th:block>
  </head>
  <body th:remove="tag">
    <th:block
      th:insert="~{components/list-moment-summary/template :: body(moments = ${moments}, pageTemplateName = 'moments')}"
    ></th:block>
  </body>
</th:block>
