<!doctype html>
<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{components/base-layout/template :: html(
    title = |#{page.friends.page-title} - ${site.title}|,
    head = ~{:: head},
    content = ~{:: body},
    header = ~{components/header/template :: body},
    navbar = ~{}
  )}"
>
  <head th:remove="tag">
    <link
      rel="canonical"
      th:if="${theme.config?.friends_page_styles?.is_enable_canonical_link}"
      th:href="${siteUrl} + @{/friends}"
    />
    <script src="/page-components/friends/index.ts" type="module"></script>
    <th:block th:insert="~{components/header/template :: head}"></th:block>
    <th:block th:insert="~{components/list-friends-summary/template :: head(friends = ${friends})}"></th:block>
  </head>
  <body th:remove="tag">
    <article id="friends" class="friends" itemscope itemtype="http://schema.org/CollectionPage">
      <h1>
        <a th:href="@{/friends}" th:text="#{page.friends.title}">朋友圈标题替换位</a>
      </h1>
      <th:block
        th:insert="~{components/list-friends-summary/template :: body(friends = ${friends}, pageTemplateName = 'friends')}"
      ></th:block>
    </article>
  </body>
</th:block>
