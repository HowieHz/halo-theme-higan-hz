<!doctype html>
<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{components/base-layout/template :: html(
    title = ${#annotations.getOrDefault(singlePage, 'higan.howiehz.top/page-title', singlePage.spec?.title)}, 
    head = ~{:: head},
    content = ~{:: body}, 
    header = ~{}, 
    navbar = ~{components/nav-page-like-post-style/template :: navbar}, 
    language = ${#annotations.get(singlePage, 'higan.howiehz.top/page-language')}
  )}"
>
  <head th:remove="tag">
    <link
      rel="canonical"
      th:if="${theme.config?.custom_page_styles?.is_enable_canonical_link}"
      th:href="${siteUrl} + @{${singlePage.status.permalink}}"
    />
    <script src="/page-components/page-like-post-style/index.ts" type="module"></script>
    <th:block
      th:if="${theme.config?.post_styles?.is_show_post_nav_share_button
               or theme.config?.post_styles?.is_show_share_footer}"
      th:insert="~{components/share/template :: head}"
    ></th:block>
    <th:block
      th:if="${theme.config?.custom_page_styles?.is_custom_page_comment_section_show
               and haloCommentEnabled}"
      th:insert="~{components/halo-comment-widget/template :: head}"
    ></th:block>
  </head>
  <body th:remove="tag">
    <th:block
      th:if="${theme.config?.post_styles?.is_custom_toc_max_width}"
      th:insert="~{components/toc-max-width-style/template :: body}"
    ></th:block>
    <style th:if="${theme.config?.custom_page_styles?.is_optimize_content_paragraph_spacing}">
      .content > p {
        min-height: 1.1em;
      }
    </style>
    <!--/* 默认编辑器插入图片会有一个 display: inline-block，以及其他样式，因此需要排除避免产生以外缩进 */-->
    <th:block
      th:if="${theme.config?.custom_page_styles?.is_enable_paragraph_first_line_indent}"
      th:insert="~{components/paragraph-first-line-indent-style/template :: body(
        indentValue=${theme.config?.custom_page_styles?.paragraph_first_line_indent_value}
      )}"
    ></th:block>
    <th:block th:insert="~{components/heading-anchor-symbol-style/template :: body}"></th:block>
    <article class="post" itemscope itemtype="http://schema.org/BlogPosting">
      <header>
        <h1>
          <th:block th:text="${singlePage.spec?.title}">标题替换位</th:block
          ><th:block th:replace="~{components/common/template :: theme-toggle-button}"></th:block>
        </h1>
        <div class="meta">
          <!--/* 预计阅读时长 
          inline-block 保证图标和数字在一行 */-->
          <span
            class="inline-block"
            th:if="${theme.config?.custom_page_styles?.is_show_post_estimated_reading_time}"
            th:with="wordCount = ${pluginFinder.available('extra-api', '3.*')
                                   ? extraApiStatsFinder.getContentWordCount(singlePage.content?.content)
                                   : #strings.length(singlePage.content?.content) / 2 }"
            th:title="#{page.post.estimated-reading-time(#{common.words(${wordCount})})}"
          >
            <span class="iconify mdi--clock-outline"></span>
            <span
              class="readtime"
              th:text="#{common.min(${#numbers.formatDecimal(wordCount * 1.0 / 450, 1, 1) + '~' + #numbers.formatDecimal(wordCount * 1.0 / 350, 1, 1)})}"
            >
              文章预计阅读时间替换位
            </span>
          </span>

          <!--/* 字数统计 
          inline-block 保证图标和数字在一行 */-->
          <span
            class="inline-block"
            th:if="${theme.config?.custom_page_styles?.is_show_post_word_count}"
            th:with="wordCount = ${pluginFinder.available('extra-api', '3.*')
                                   ? extraApiStatsFinder.getContentWordCount(singlePage.content?.content)
                                   : #strings.length(singlePage.content?.content) / 2 }"
            th:title="|#{page.post.word-count} #{common.words(${wordCount})}|"
          >
            <span class="iconify fluent--text-edit-style-character-a-32-regular"></span>
            <span class="word-count" th:text="${wordCount}">文章字数替换位</span>
          </span>
        </div>
      </header>

      <div class="content flex-auto" itemprop="articleBody" th:utext="${singlePage.content?.content}">
        singlePage formatted content
      </div>
      <hr
        th:if="${theme.config?.custom_page_styles?.is_dividing_line_at_the_end_of_content_show}"
        class="divide my-10"
      />
      <div
        class="post-comment"
        th:if="${theme.config?.custom_page_styles?.is_custom_page_comment_section_show
                 and haloCommentEnabled}"
      >
        <halo:comment group="content.halo.run" kind="SinglePage" th:name="${singlePage.metadata?.name}"></halo:comment>
      </div>
    </article>
    <div th:replace="~{components/footer-nav-page-like-post-style/template :: footerNav}"></div>
    <script type="module">
      import { isMobile } from "/page-components/utils/device.ts";
      import { initTOC } from "/page-components/utils/toc.ts";
      import { initHeadingAnchors } from "/page-components/utils/heading-anchor.ts";

      document.addEventListener("DOMContentLoaded", function () {
        // <!--/* generate toc
        // wontfix：如果电脑屏幕较窄，文章页用的是底部导航栏，目录按钮按了之后不会显示目录
        // 但是目录按钮在手机端是正常的，为了保证性能，不做特殊处理 */-->
        if (isMobile()) {
          initTOC("article > .content", "#toc-footer");
        } else if (window.matchMedia("(min-width: 640px) and (not (min-width: 1024px))").matches) {
          initTOC("article > .content", "#toc-tablet");
        } else {
          initTOC("article > .content", "#toc");
        }
        initHeadingAnchors("article > .content");
      });
    </script>
  </body>
</th:block>
