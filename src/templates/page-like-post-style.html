<!doctype html>
<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{components/base-layout/template :: html(
    title = ${#annotations.getOrDefault(singlePage, 'higan.howiehz.top/page-title', singlePage.spec?.title)}, 
    head = ~{:: head},
    content = ~{:: body}, 
    header = ~{}, 
    navbar = ~{components/nav-page-like-post-style/template :: body}, 
    language = ${#annotations.get(singlePage, 'higan.howiehz.top/page-language')}
  )}"
>
  <head th:remove="tag">
    <link
      rel="canonical"
      th:if="${theme.config?.custom_page_styles?.is_enable_canonical_link}"
      th:href="${siteUrl} + @{${singlePage.status.permalink}}"
    />
    <script
      src="@runtime/pages/page-like-post-style/index.ts"
      type="module"
    ></script>
    <th:block
      th:if="${theme.config?.post_styles?.is_show_post_nav_share_button
               or theme.config?.post_styles?.is_show_share_footer}"
      th:insert="~{components/share/template :: head}"
    ></th:block>
    <th:block
      th:if="${theme.config?.custom_page_styles?.is_custom_page_comment_section_show
               and haloCommentEnabled}"
      th:insert="~{components/halo-comment-widget/template :: head}"
    ></th:block>
    <th:block
      th:if="${theme.config?.styles?.is_show_color_scheme_toggle_button}"
      th:insert="~{components/theme-toggle-button/template :: head}"
    ></th:block>
    <th:block
      th:if="${theme.config?.post_styles?.is_show_footer_nav}"
      th:insert="~{components/footer-nav-page-like-post-style/template :: head}"
    ></th:block>
    <th:block th:insert="~{components/nav-page-like-post-style/template :: head}"></th:block>
  </head>
  <body th:remove="tag">
    <th:block
      th:if="${theme.config?.post_styles?.is_custom_toc_max_width}"
      th:insert="~{components/toc-max-width-style/template :: body}"
    ></th:block>
    <style th:if="${theme.config?.custom_page_styles?.is_optimize_content_paragraph_spacing}">
      .content > p {
        min-height: 1.1em;
      }
    </style>
    <!--/* 默认编辑器插入图片会有一个 display: inline-block，以及其他样式，因此需要排除避免产生以外缩进 */-->
    <th:block
      th:if="${theme.config?.custom_page_styles?.is_enable_paragraph_first_line_indent}"
      th:insert="~{components/paragraph-first-line-indent-style/template :: body(
        indentValue=${theme.config?.custom_page_styles?.paragraph_first_line_indent_value}
      )}"
    ></th:block>
    <th:block th:insert="~{components/heading-anchor-symbol-style/template :: body}"></th:block>
    <th:block th:insert="~{components/heading-anchor-svg/template :: body}"></th:block>
    <article
      class="post"
      itemscope
      itemtype="http://schema.org/BlogPosting"
    >
      <header id="article-header">
        <h1>
          <span
            class="article-title-text"
            th:text="${singlePage.spec?.title}"
            >标题替换位</span
          >
          <th:block
            th:if="${theme.config?.styles?.is_show_color_scheme_toggle_button}"
            th:insert="~{components/theme-toggle-button/template :: body}"
          ></th:block>
        </h1>
        <div class="meta">
          <!--/* 预计阅读时长 
          inline-flex 保证图标和数字在一行 */-->
          <span
            class="tw:inline-flex tw:items-center tw:gap-x-[1ch] tw:align-middle"
            th:if="${theme.config?.custom_page_styles?.is_show_post_estimated_reading_time}"
            th:with="wordCount = ${pluginFinder.available('extra-api', '3.*')
                                   ? extraApiStatsFinder.getContentWordCount(singlePage.content?.content)
                                   : #strings.length(singlePage.content?.content) / 2 }"
            th:title="#{page.post.estimated-reading-time(#{common.words(${wordCount})})}"
          >
            <span class="tw:iconify tw:mdi--clock-outline"></span>
            <span
              class="readtime"
              th:text="#{common.min(${#numbers.formatDecimal(wordCount * 1.0 / 450, 1, 1) + '~' + #numbers.formatDecimal(wordCount * 1.0 / 350, 1, 1)})}"
            >
              文章预计阅读时间替换位
            </span>
          </span>

          <!--/* 字数统计 
          inline-flex 保证图标和数字在一行 */-->
          <span
            class="tw:inline-flex tw:items-center tw:gap-x-[1ch] tw:align-middle"
            th:if="${theme.config?.custom_page_styles?.is_show_post_word_count}"
            th:with="wordCount = ${pluginFinder.available('extra-api', '3.*')
                                   ? extraApiStatsFinder.getContentWordCount(singlePage.content?.content)
                                   : #strings.length(singlePage.content?.content) / 2 }"
            th:title="|#{page.post.word-count} #{common.words(${wordCount})}|"
          >
            <span class="tw:iconify tw:mdi--format-text"></span>
            <span
              class="word-count"
              th:text="${wordCount}"
              >文章字数替换位</span
            >
          </span>
        </div>
      </header>

      <div
        class="content tw:flex-auto"
        itemprop="articleBody"
        th:utext="${singlePage.content?.content}"
      >
        singlePage formatted content
      </div>
      <hr
        th:if="${theme.config?.custom_page_styles?.is_dividing_line_at_the_end_of_content_show}"
        class="divide tw:my-10"
      />
      <div
        class="post-comment"
        th:if="${theme.config?.custom_page_styles?.is_custom_page_comment_section_show
                 and haloCommentEnabled}"
      >
        <halo:comment
          group="content.halo.run"
          kind="SinglePage"
          th:name="${singlePage.metadata?.name}"
        ></halo:comment>
      </div>
    </article>
    <th:block
      th:if="${theme.config?.post_styles?.is_show_footer_nav}"
      th:insert="~{components/footer-nav-page-like-post-style/template :: body}"
    ></th:block>
    <script type="module">
      import { initTOC } from "@runtime/scripts/toc.ts";
      import { initHeadingAnchors } from "@runtime/scripts/heading-anchor.ts";

      document.addEventListener("DOMContentLoaded", function () {
        ["#toc", "#toc-tablet", "#toc-footer"].forEach((tocSelector) => {
          initTOC("article > .content", tocSelector);
        });
        initHeadingAnchors("article > .content");
      });
    </script>
  </body>
</th:block>
