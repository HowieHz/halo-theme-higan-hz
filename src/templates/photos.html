<!doctype html>
<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{components/base-layout/template :: html(
    title = |${title} - ${site.title}|,
    head = ~{:: head},
    content = ~{:: body}, 
    header = ~{components/header/template :: body}, 
    navbar = ~{}
  )}"
>
  <head th:remove="tag">
    <link
      rel="canonical"
      th:if="${theme.config?.photos_styles?.is_enable_canonical_link}"
      th:href="${siteUrl} + @{/photos}"
    />
    <script
      src="@runtime/pages/photos/index.ts"
      type="module"
    ></script>
    <th:block th:insert="~{components/header/template :: head}"></th:block>
  </head>
  <body th:remove="tag">
    <article
      class="photos post"
      itemscope
      itemtype="http://schema.org/BlogPosting"
    >
      <script
        id="photos-masonry-script"
        vite-ignore
        type="module"
        th:if="${theme.config?.photos_styles?.is_enable_masonry_layout}"
        th:data-max-masonry-columns="${theme.config?.photos_styles?.max_masonry_columns}"
        th:data-min-masonry-columns="${theme.config?.photos_styles?.min_masonry_columns}"
        th:data-min-img-width="${theme.config?.photos_styles?.min_img_width}"
        th:data-masonry-gap="${theme.config?.photos_styles?.masonry_gap}"
      >
        const masonryScript = document.querySelector("#photos-masonry-script");

        class Waterfall {
          constructor(options) {
            this.$el = options.$el || null; // <!--/* 父容器 */-->
            this.columns = options.columns || 4; // <!--/* 列数 */-->
            this.gap = options.gap || 10; // <!--/* 间距 */-->
            this.width = 0; // <!--/* 的宽度 */-->
            this.items = []; // <!--/* 子元素集合 */-->
            this.nextImageIndex = 0; // <!--/* 存储下一个需要加载的图片的 index */-->
            this.totalImages = 0; // <!--/* 存储一共有多少张图片 */-->
            this.H = []; // <!--/* 存储每列的高度方便计算 */-->
            this.flag = null; // <!--/* 虚拟节点集合 */-->
            this.init();
          }
          init() {
            if (this.$el) {
              this.addChildren(Array.from(this.$el.children));
            } else {
              throw new Error("Parent container element not found");
            }
          }
          addChildren(children) {
            if (!Array.isArray(children)) {
              throw new Error("Children should be an array");
            }
            children.forEach((child) => {
              if (!this.items.includes(child)) {
                this.$el.appendChild(child); // <!--/* appendChild 方法会将 child 元素从其当前父元素中移除（如果有的话），然后将其附加到新的父元素 this.$el 中 */-->
                this.items.push(child);
                this.totalImages++;
              }
            });
            this.reset();
            this.render();
          }
          reset() {
            this.flag = document.createDocumentFragment();
            this.width = this.$el.clientWidth / this.columns;
            this.H = new Array(this.columns).fill(0);
            this.$el.innerHTML = "";
          }
          render() {
            const { width, items, flag, H, gap } = this;
            items.forEach((item) => {
              item.style.width = `${width}px`;
              item.style.position = "absolute";
              const img = item.querySelector("img");

              if (img) {
                const placeAndAnimate = () => {
                  item.style.opacity = 0; // <!--/* 为动画做准备 */-->
                  this.placeItem(item, img, H, width, gap, flag);
                  this.updateContainerHeight(); // <!--/* 扩展上级控件高度 使得底部内容不会跑到图片底下 */-->
                  this.checkAndLoadMoreImages(); // <!--/* 检查是否可能要接着加载图片 */-->
                  requestAnimationFrame(() => {
                    // <!--/* 加载动画 fade in */-->
                    item.style.transition =
                      "opacity [(${theme.config?.photos_styles?.img_transition_duration_after_load})]s";
                    item.style.opacity = 1;
                  });
                };
                img.complete ? placeAndAnimate() : img.addEventListener("load", placeAndAnimate);
              }
            });
          }
          placeItem(item, img, H, width, gap, flag) {
            const tag = H.indexOf(Math.min(...H));
            item.style.left = `${tag * (width + gap)}px`;
            item.style.top = `${H[tag]}px`;
            H[tag] += (img.height * width) / img.width + gap;
            flag.appendChild(item);
            this.$el.append(flag);
          }
          getMaxHeight() {
            return Math.max(...this.H);
          }
          updateContainerHeight() {
            const maxHeight = this.getMaxHeight();
            this.$el.style.height = `${maxHeight}px`;
          }
          checkAndLoadMoreImages() {
            if (window.scrollY + window.innerHeight + 200 >= this.getMaxHeight()) {
              // <!--/* 读取到的高度其实还可以 +300 提前多加载点。如果这里不设置提前量，出现长一点的图片很容易旁边都是空的 */-->
              if (this.nextImageIndex < this.totalImages) {
                const img = this.items[this.nextImageIndex].querySelector("img");
                img.style.display = "block";
                // <!--/* 因为上面设置了图片加载好自动重新排版(reset and render)，所以这里只需要让图片加载出来即可 */-->
                img.loading = "eager";
                this.nextImageIndex++;
              }
            }
          }
        }

        window.onload = () => {
          const MAX_MASONRY_COLUMNS = Number(masonryScript?.dataset.maxMasonryColumns ?? 4);
          const MIN_MASONRY_COLUMNS = Number(masonryScript?.dataset.minMasonryColumns ?? 1);
          const MIN_IMG_WIDTH = Number(masonryScript?.dataset.minImgWidth ?? 300);
          const masonryGap = Number(masonryScript?.dataset.masonryGap ?? 10);

          function calculateColumns() {
            const width = window.innerWidth;
            const columns = Math.floor(width / MIN_IMG_WIDTH);
            return Math.max(MIN_MASONRY_COLUMNS, Math.min(columns, MAX_MASONRY_COLUMNS));
          }

          const photoLists = document.querySelectorAll(".photo-list");
          const waterfallInstances = [];

          photoLists.forEach(($el) => {
            const waterfallInstance = new Waterfall({
              $el: $el,
              columns: calculateColumns(),
              gap: masonryGap,
            });
            waterfallInstances.push(waterfallInstance);
          });

          const checkAllWaterfalls = () => {
            waterfallInstances.forEach((waterfallInstance) => {
              waterfallInstance.checkAndLoadMoreImages();
            });
          };

          let resizeScheduled = false;
          window.addEventListener("resize", () => {
            if (!resizeScheduled) {
              resizeScheduled = true;
              requestAnimationFrame(() => {
                const newColumns = calculateColumns();
                waterfallInstances.forEach((waterfallInstance) => {
                  if (newColumns !== waterfallInstance.columns) {
                    waterfallInstance.columns = newColumns;
                    waterfallInstance.reset();
                    waterfallInstance.render();
                  }
                });
                checkAllWaterfalls();
                resizeScheduled = false;
              });
            }
          });

          window.addEventListener("scroll", checkAllWaterfalls);

          // <!--/* 加载第一张图片，以及递归加载其他的图片 */-->
          checkAllWaterfalls();
        };
      </script>

      <script
        id="photos-standard-script"
        vite-ignore
        type="module"
        th:unless="${theme.config?.photos_styles?.is_enable_masonry_layout}"
        th:data-img-transition-duration-after-load="${theme.config?.photos_styles?.img_transition_duration_after_load}"
      >
        const standardScript = document.querySelector("#photos-standard-script");
        const imgTransitionDurationAfterLoad = Number(standardScript?.dataset.imgTransitionDurationAfterLoad ?? 0);
        const photos = document.querySelectorAll(".photo-groups img");
        let nextImageIndex = 0; // <!--/* 存储下一个需要加载的图片的 index */-->
        const totalImages = photos.length; // <!--/* 存储一共有多少张图片 */-->
        let totalheight = 0; // <!--/* 最后一张图片下边缘的位置 */-->

        photos.forEach((img) => {
          const placeAndAnimate = () => {
            // <!--/* 加载好一张图之后检查是否能继续加载 */-->
            checkAndLoadMoreImages();
            // <!--/* 加载动画 fade in */-->
            requestAnimationFrame(() => {
              img.style.transition = `opacity ${imgTransitionDurationAfterLoad}s`;
              img.style.opacity = 1;
            });
          };
          img.complete ? placeAndAnimate() : img.addEventListener("load", placeAndAnimate);
        });

        function checkAndLoadMoreImages() {
          if (window.scrollY + window.innerHeight + 200 >= totalheight) {
            // <!--/* 读取到的高度其实还可以 +300 提前多加载点。如果这里不设置提前量，出现长一点的图片很容易旁边都是空的 */-->
            if (nextImageIndex < totalImages) {
              const img = photos[nextImageIndex];
              img.style.display = "block";
              // <!--/* 因为上面设置了图片加载好自动重新排版(reset and render)，所以这里只需要让图片加载出来即可 */-->
              img.loading = "eager";
              totalheight = img.getBoundingClientRect().bottom;
              nextImageIndex++;
            }
          }
        }

        window.addEventListener("scroll", () => checkAndLoadMoreImages());
        window.addEventListener("resize", () => checkAndLoadMoreImages());

        checkAndLoadMoreImages();
      </script>

      <script>
        document.addEventListener("DOMContentLoaded", () => {
          const content = document.querySelector(".content");

          const handleEvent = (event, attr) => {
            const img = event.target.closest(`img[${attr}]`);
            if (img && content.contains(img)) {
              const code = img.getAttribute(attr);
              executeCustomCode(code, img);
            }
          };

          content.addEventListener("mouseover", (event) => handleEvent(event, "data-img-onmouseover"));
          content.addEventListener("mouseout", (event) => handleEvent(event, "data-img-onmouseout"));

          const executeCustomCode = (code, element) => {
            if (code) {
              try {
                eval(code.replace(/this/g, "element"));
              } catch (error) {
                console.error("[Higan Haozi][photos] Error executing custom code:", error);
              }
            }
          };
        });
      </script>
      <div
        class="content"
        th:with="
          currentGroup=${'' + param.group},
          hasCurrentGroup=${!#strings.isEmpty(currentGroup)},
          isMasonry=${theme.config?.photos_styles?.is_enable_masonry_layout},
          showGroupName=${theme.config?.photos_styles?.is_show_photo_group_name},
          groups=${photoFinder.groupBy()},
          currentGroupPhotos=${hasCurrentGroup ? photoFinder.listBy(currentGroup) : null}
        "
      >
        <th:block th:if="${isMasonry}">
          <th:block th:unless="${hasCurrentGroup}">
            <th:block th:unless="${showGroupName}">
              <ul class="photo-list">
                <th:block th:each="group : ${groups}">
                  <th:block th:each="photo : ${group.photos}">
                    <th:block th:replace="~{components/photo-list-item/template :: body(${photo}, '')}"></th:block>
                  </th:block>
                </th:block>
              </ul>
            </th:block>
            <th:block th:if="${showGroupName}">
              <div
                class="photo-groups"
                th:each="group : ${groups}"
              >
                <h2 th:text="${group.spec.displayName}"></h2>
                <ul class="photo-list">
                  <th:block th:each="photo : ${group.photos}">
                    <th:block th:replace="~{components/photo-list-item/template :: body(${photo}, '')}"></th:block>
                  </th:block>
                </ul>
              </div>
            </th:block>
          </th:block>
          <th:block th:if="${hasCurrentGroup}">
            <th:block th:unless="${showGroupName}">
              <ul class="photo-list">
                <th:block th:each="photo : ${currentGroupPhotos}">
                  <th:block th:replace="~{components/photo-list-item/template :: body(${photo}, '')}"></th:block>
                </th:block>
              </ul>
            </th:block>
            <th:block th:if="${showGroupName}">
              <th:block
                th:each="group : ${groups}"
                th:if="${group.metadata.name == currentGroup}"
              >
                <div class="photo-groups">
                  <h2 th:text="${group.spec.displayName}"></h2>
                  <ul class="photo-list">
                    <th:block th:each="photo : ${currentGroupPhotos}">
                      <th:block th:replace="~{components/photo-list-item/template :: body(${photo}, '')}"></th:block>
                    </th:block>
                  </ul>
                </div>
              </th:block>
            </th:block>
          </th:block>
        </th:block>

        <th:block th:unless="${isMasonry}">
          <th:block th:unless="${hasCurrentGroup}">
            <div
              class="photo-groups"
              th:each="group : ${groups}"
            >
              <h2
                th:text="${group.spec.displayName}"
                th:if="${showGroupName}"
              ></h2>
              <ul class="photo-list">
                <th:block th:each="photo : ${group.photos}">
                  <th:block
                    th:replace="~{components/photo-list-item/template :: body(${photo}, 'opacity: 0; ')}"
                  ></th:block>
                </th:block>
              </ul>
            </div>
          </th:block>
          <th:block th:if="${hasCurrentGroup}">
            <th:block
              th:each="group : ${groups}"
              th:if="${group.metadata.name == currentGroup}"
            >
              <div class="photo-groups">
                <h2
                  th:text="${group.spec.displayName}"
                  th:if="${showGroupName}"
                ></h2>
                <ul class="photo-list">
                  <th:block th:each="photo : ${currentGroupPhotos}">
                    <th:block
                      th:replace="~{components/photo-list-item/template :: body(${photo}, 'opacity: 0; ')}"
                    ></th:block>
                  </th:block>
                </ul>
              </div>
            </th:block>
          </th:block>
        </th:block>
      </div>
    </article>
  </body>
</th:block>
