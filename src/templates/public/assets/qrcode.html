<!doctype html>
<html lang="en" style="border: 0 solid">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QRCode Share</title>
    <style>
      #qrcode canvas {
        left: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      body {
        background-color: #eceae7;
      }
    </style>
  </head>
  <body>
    <script crossorigin src="/themes/howiehz-higan/assets/lib/easyqrcode/easy.qrcode.4.6.2.min.js" integrity="sha384-+ACTh1wjQ5SAGove5YFrqDcZPJ5t2ylJTxpj7hjCPS4NvdTmo4YVZHGSJcRJphJf"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const params = new URLSearchParams(window.location.search);
        const url = params.get("url") ?? "";
        const size = Number.parseInt(params.get("size") ?? "", 10) || 200;
        new QRCode(document.getElementById("qrcode"), {
          colorLight: "#eceae7",
          correctLevel: QRCode.CorrectLevel.L,
          height: size,
          text: url,
          width: size,
        });
      });
    </script>
    <div id="qrcode"></div>
  </body>
</html>
