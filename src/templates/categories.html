<!doctype html>
<th:block
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{components/base-layout/template :: html(
    title = #{page.categories.page-title},
    head = ~{:: head},
    content = ~{:: body},
    header = ~{components/header/template :: body},
    navbar = ~{}
  )}"
>
  <head th:remove="tag">
    <meta
      name="description"
      th:attr="content=${#strings.isEmpty(theme.config?.categories_page_styles?.description) ? site?.seo?.description : theme.config?.categories_page_styles?.description}"
    />
    <link
      rel="canonical"
      th:if="${theme.config?.categories_page_styles?.is_enable_canonical_link}"
      th:href="${siteUrl} + @{{prefix}(prefix = ${site.routes.categoriesUri})}"
    />
    <script src="/page-components/categories/index.ts" type="module"></script>
    <th:block th:insert="~{components/header/template :: head}"></th:block>
  </head>
  <body th:remove="tag">
    <h1>
      <th:block th:text="#{page.categories.title}">标题替换位</th:block>
    </h1>
    <th:block th:insert="~{components/category-tree/template :: body(categories = ${categories})}"></th:block>
  </body>
</th:block>
